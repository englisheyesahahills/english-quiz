<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일반동사 시험 – 잉글리시아이스쿨관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f0f4ff; color: #1a1a1a; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #25a56a, #1d8a56); color: #fff; padding: 22px 20px 18px; text-align: center; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header-desc { font-size: 12px; opacity: 0.8; }
  .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #e0e5ee; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=text]:focus, select:focus { border-color: #25a56a; }
  .start-btn { width: 100%; margin-top: 20px; padding: 15px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #25a56a, #1d8a56); color: #fff; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 0.3px; }
  .start-btn:disabled { background: #aaa; cursor: default; }

  /* 문제 화면 */
  .progress-wrap { margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-score { font-size: 12px; font-weight: 600; color: #25a56a; }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 99px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #25a56a, #60a5fa); border-radius: 99px; transition: width 0.4s ease; }

  .question-card { background: #fff; border-radius: 16px; padding: 22px 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-num { font-size: 11px; color: #25a56a; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
  .question-sub { font-size: 13px; color: #555; margin-top: 6px; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 500; background: #f8faff; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #1a1a1a; }
  .option-btn:hover:not(:disabled) { background: #eef6ff; border-color: #25a56a; }
  .option-btn.correct { background: #e6f9f0; border-color: #25a56a; color: #1a6640; font-weight: 700; }
  .option-btn.wrong { background: #fff0f0; border-color: #f87171; color: #b91c1c; }
  .option-btn:disabled { cursor: default; }

  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .feedback.correct { background: #e6f9f0; color: #1a6640; }
  .feedback.wrong { background: #fff0f0; color: #b91c1c; }

  .next-btn { width: 100%; margin-top: 14px; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #25a56a, #1d8a56); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  /* 결과 화면 */
  .result-card { background: #fff; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-score { font-size: 42px; font-weight: 800; color: #25a56a; margin-bottom: 4px; }
  .result-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .result-msg { font-size: 15px; color: #444; padding: 14px; background: #f0faf5; border-radius: 12px; margin-bottom: 20px; }
  .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #25a56a, #1d8a56); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  .hidden { display: none; }
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <div class="header">
    <div class="header-sub">ENGLISH TEST</div>
    <div class="header-title">일반동사 시험 📝</div>
    <div class="header-desc">초등 4~5학년 · 30문제 · 객관식</div>
  </div>
  <div class="content">
    <div class="card">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" oninput="checkReady()">
      <label>반</label>
      <select id="studentClass" onchange="checkReady()">
        <option value="">반을 선택하세요</option>
        <option>A반</option><option>B반</option><option>C반</option><option>D반</option>
      </select>
      <button class="start-btn" id="startBtn" disabled onclick="startTest()">시험 시작하기 →</button>
    </div>
  </div>
</div>

<!-- 문제 화면 -->
<div id="testScreen" class="hidden">
  <div class="header">
    <div class="header-sub" id="headerName"></div>
    <div class="header-title">일반동사 시험</div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 30</span>
        <span class="progress-score" id="progressScore">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="question-num" id="questionNum">Q1</div>
      <div class="question-text" id="questionText"></div>
      <div class="question-sub" id="questionSub"></div>
    </div>
    <div class="options" id="optionsArea"></div>
    <div class="feedback hidden" id="feedbackArea"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<!-- 결과 화면 -->
<div id="resultScreen" class="hidden">
  <div class="header">
    <div class="header-sub">RESULT</div>
    <div class="header-title">시험 완료! 🎉</div>
  </div>
  <div class="content">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-sub">30문제 중</div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="retry-btn" onclick="retryTest()">다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const questions = [
  // 1~6: 동사 뜻 맞히기
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "run", options: ["먹다","달리다","자다","읽다"], answer: 1 },
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "eat", options: ["놀다","걷다","먹다","보다"], answer: 2 },
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "swim", options: ["수영하다","날다","공부하다","쓰다"], answer: 0 },
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "write", options: ["쓰다","읽다","듣다","말하다"], answer: 0 },
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "cook", options: ["먹다","요리하다","씻다","사다"], answer: 1 },
  { q: "다음 단어의 뜻으로 알맞은 것은?", sub: "draw", options: ["그리다","지우다","색칠하다","붙이다"], answer: 0 },

  // 7~10: 우리말 → 영어
  { q: "우리말 뜻에 맞는 영어 단어는?", sub: "공부하다", options: ["play","study","sleep","watch"], answer: 1 },
  { q: "우리말 뜻에 맞는 영어 단어는?", sub: "마시다", options: ["drive","drink","drop","draw"], answer: 1 },
  { q: "우리말 뜻에 맞는 영어 단어는?", sub: "말하다", options: ["speak","spend","spell","spill"], answer: 0 },
  { q: "우리말 뜻에 맞는 영어 단어는?", sub: "도움을 주다", options: ["hurt","hope","help","hide"], answer: 2 },

  // 11~16: 3인칭 단수 현재형 (s/es)
  { q: "빈칸에 알맞은 동사를 고르세요. (3인칭 단수)", sub: "She ___ breakfast every morning.", options: ["eat","eats","eating","ate"], answer: 1 },
  { q: "빈칸에 알맞은 동사를 고르세요. (3인칭 단수)", sub: "He ___ his homework after school.", options: ["do","does","doing","did"], answer: 1 },
  { q: "빈칸에 알맞은 동사를 고르세요. (3인칭 단수)", sub: "My cat ___ a lot.", options: ["sleep","sleeping","sleeps","slept"], answer: 2 },
  { q: "빈칸에 알맞은 동사를 고르세요. (3인칭 단수)", sub: "Tom ___ to school by bus.", options: ["go","goes","going","went"], answer: 1 },
  { q: "빈칸에 알맞은 동사를 고르세요. (3인칭 단수)", sub: "She ___ English very well.", options: ["speak","speaks","speaking","spoke"], answer: 1 },
  { q: "3인칭 단수형이 올바른 것은?", sub: "study → ?", options: ["studys","studies","studyes","studing"], answer: 1 },

  // 17~22: 과거형
  { q: "다음 동사의 과거형으로 알맞은 것은?", sub: "go → ?", options: ["goed","goes","went","gone"], answer: 2 },
  { q: "다음 동사의 과거형으로 알맞은 것은?", sub: "eat → ?", options: ["eated","eats","ate","eaten"], answer: 2 },
  { q: "다음 동사의 과거형으로 알맞은 것은?", sub: "run → ?", options: ["runned","runs","run","ran"], answer: 3 },
  { q: "빈칸에 알맞은 과거형 동사를 고르세요.", sub: "I ___ pizza for lunch yesterday.", options: ["eat","eats","ate","eaten"], answer: 2 },
  { q: "빈칸에 알맞은 과거형 동사를 고르세요.", sub: "She ___ a book last night.", options: ["read","reads","reading","readed"], answer: 0 },
  { q: "빈칸에 알맞은 과거형 동사를 고르세요.", sub: "They ___ to the park last Sunday.", options: ["go","goes","went","going"], answer: 2 },

  // 23~25: 부정문
  { q: "다음 중 올바른 부정문은?", sub: "I (좋아하지 않는다) milk.", options: ["I not like milk.","I don't like milk.","I doesn't like milk.","I am not like milk."], answer: 1 },
  { q: "다음 중 올바른 부정문은?", sub: "She (가지 않는다) to school on Sunday.", options: ["She don't go.","She doesn't go.","She not go.","She isn't go."], answer: 1 },
  { q: "다음 중 올바른 부정문은? (과거)", sub: "He (보지 않았다) TV last night.", options: ["He didn't watch TV.","He doesn't watch TV.","He not watched TV.","He wasn't watch TV."], answer: 0 },

  // 26~27: 의문문
  { q: "다음 중 올바른 의문문은?", sub: "(그는 피아노를 치니?)", options: ["Do he play the piano?","Does he plays the piano?","Does he play the piano?","Is he play the piano?"], answer: 2 },
  { q: "다음 중 올바른 의문문은? (과거)", sub: "(너는 어제 숙제를 했니?)", options: ["Do you did your homework?","Did you do your homework?","Did you did your homework?","Does you do your homework?"], answer: 1 },

  // 28~30: 종합 문제
  { q: "밑줄 친 부분이 올바른 문장은?", sub: "", options: ["She don't like cats.","He goes to school every day.","They eats lunch at noon.","I am play soccer."], answer: 1 },
  { q: "빈칸에 알맞은 말을 고르세요.", sub: "___ she walk to school every day?", options: ["Do","Is","Did","Does"], answer: 3 },
  { q: "빈칸에 알맞은 말을 고르세요.", sub: "___ you go to the zoo yesterday?", options: ["Do","Does","Did","Are"], answer: 2 },
];

let currentQ = 0;
let score = 0;
let answered = false;

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled = !(name && cls);
}

function startTest() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent = name + ' · ' + cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionNum').textContent = 'Q' + (currentQ + 1);
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionSub').textContent = q.sub;
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / 30';
  document.getElementById('progressScore').textContent = '점수: ' + score;
  document.getElementById('progressFill').style.width = (currentQ / 30 * 100) + '%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = ['①','②','③','④'][i] + ' ' + opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedbackArea');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback wrong';
    fb.textContent = '❌ 틀렸어요. 정답은 ' + ['①','②','③','④'][q.answer] + ' ' + q.options[q.answer] + ' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = currentQ < 29 ? '다음 문제 →' : '결과 보기 🎉';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 30) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const name = document.getElementById('studentName').value.trim();
  const pct = Math.round(score / 30 * 100);
  document.getElementById('resultName').textContent = name + '의 결과';
  document.getElementById('resultScore').textContent = score + ' / 30';
  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 일반동사 마스터! 정말 대단해요! 👏'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금만 더 연습하면 완벽해질 거예요!'; }
  else if (pct >= 50) { emoji = '🙂'; msg = '절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.'; }
  else { emoji = '📚'; msg = '조금 더 열심히 공부해봐요! 다시 도전해보세요!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
}

function retryTest() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}
</script>
</body>
</html>
