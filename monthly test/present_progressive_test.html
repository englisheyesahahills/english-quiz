<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현재진행형 시험 – 잉글리시아이스쿨관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f0f4ff; color: #1a1a1a; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; padding: 22px 20px 18px; text-align: center; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header-desc { font-size: 12px; opacity: 0.8; }
  .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #e0e5ee; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=text]:focus, select:focus { border-color: #7c3aed; }
  .start-btn { width: 100%; margin-top: 20px; padding: 15px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 0.3px; }
  .start-btn:disabled { background: #aaa; cursor: default; }

  .progress-wrap { margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-score { font-size: 12px; font-weight: 600; color: #7c3aed; }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 99px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 99px; transition: width 0.4s ease; }

  .question-card { background: #fff; border-radius: 16px; padding: 22px 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-num { font-size: 11px; color: #7c3aed; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
  .question-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; margin-left: 6px; }
  .badge-ing { background: #ede9fe; color: #5b21b6; }
  .badge-neg { background: #fce7f3; color: #9d174d; }
  .badge-que { background: #dbeafe; color: #1e40af; }
  .badge-basic { background: #d1fae5; color: #065f46; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
  .question-sub { font-size: 15px; color: #333; margin-top: 8px; font-style: italic; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 500; background: #f8faff; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #1a1a1a; }
  .option-btn:hover:not(:disabled) { background: #f3f0ff; border-color: #7c3aed; }
  .option-btn.correct { background: #e6f9f0; border-color: #25a56a; color: #1a6640; font-weight: 700; }
  .option-btn.wrong { background: #fff0f0; border-color: #f87171; color: #b91c1c; }
  .option-btn:disabled { cursor: default; }

  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .feedback.correct { background: #e6f9f0; color: #1a6640; }
  .feedback.wrong { background: #fff0f0; color: #b91c1c; }

  .next-btn { width: 100%; margin-top: 14px; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  .result-card { background: #fff; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-score { font-size: 42px; font-weight: 800; color: #7c3aed; margin-bottom: 4px; }
  .result-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .result-msg { font-size: 15px; color: #444; padding: 14px; background: #f5f3ff; border-radius: 12px; margin-bottom: 20px; }
  .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="startScreen">
  <div class="header">
    <div class="header-sub">ENGLISH TEST</div>
    <div class="header-title">현재진행형 시험 📝</div>
    <div class="header-desc">초등 4~5학년 · 30문제 · 객관식</div>
  </div>
  <div class="content">
    <div class="card">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" oninput="checkReady()">
      <label>반</label>
      <select id="studentClass" onchange="checkReady()">
        <option value="">반을 선택하세요</option>
        <option>A반</option><option>B반</option><option>C반</option><option>D반</option>
      </select>
      <button class="start-btn" id="startBtn" disabled onclick="startTest()">시험 시작하기 →</button>
    </div>
  </div>
</div>

<div id="testScreen" class="hidden">
  <div class="header">
    <div class="header-sub" id="headerName"></div>
    <div class="header-title">현재진행형 시험</div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 30</span>
        <span class="progress-score" id="progressScore">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;">
        <div class="question-num" id="questionNum">Q1</div>
        <div class="question-badge" id="questionBadge"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="question-sub" id="questionSub"></div>
    </div>
    <div class="options" id="optionsArea"></div>
    <div class="feedback hidden" id="feedbackArea"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<div id="resultScreen" class="hidden">
  <div class="header">
    <div class="header-sub">RESULT</div>
    <div class="header-title">시험 완료! 🎉</div>
  </div>
  <div class="content">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-sub">30문제 중</div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="retry-btn" onclick="retryTest()">다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const questions = [
  // ─── ing 형태 (1~10) ───────────────────────────
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "run → ?",
    options: ["runing","running","runnes","runs"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "swim → ?",
    options: ["swiming","swimmes","swimming","swims"], answer: 2 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "write → ?",
    options: ["writeing","writing","writeing","writting"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "sit → ?",
    options: ["siting","sitting","sittes","sits"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "dance → ?",
    options: ["danceing","dancing","danceying","dances"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "eat → ?",
    options: ["eatting","eates","eateing","eating"], answer: 3 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "make → ?",
    options: ["makeing","making","makking","maked"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "study → ?",
    options: ["studyying","studying","studiing","studeing"], answer: 1 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "cut → ?",
    options: ["cuting","cutted","cutting","cuteing"], answer: 2 },
  { badge: "ing형태", badgeClass: "badge-ing",
    q: "동사의 -ing 형태로 알맞은 것은?", sub: "sleep → ?",
    options: ["sleeping","slepping","sleepping","sleepeing"], answer: 0 },

  // ─── 기본 현재진행형 (11~18) ──────────────────
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "I ___ soccer now.",
    options: ["play","plays","am playing","is playing"], answer: 2 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "She ___ a book right now.",
    options: ["read","reads","am reading","is reading"], answer: 3 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "They ___ lunch now.",
    options: ["eat","eats","are eating","is eating"], answer: 2 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "He ___ to music now.",
    options: ["listen","listens","are listening","is listening"], answer: 3 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "We ___ in the park now.",
    options: ["run","runs","are running","is running"], answer: 2 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "다음 중 현재진행형 문장은?", sub: "",
    options: ["She eats breakfast.","He is sleeping now.","They went to school.","I play tennis."], answer: 1 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "Mom ___ dinner in the kitchen.",
    options: ["cook","cooks","is cooking","are cooking"], answer: 2 },
  { badge: "현재진행형", badgeClass: "badge-basic",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "My dog ___ in the yard.",
    options: ["play","plays","is playing","are playing"], answer: 2 },

  // ─── 부정문 (19~24) ──────────────────────────
  { badge: "부정문", badgeClass: "badge-neg",
    q: "알맞은 부정문을 고르세요.", sub: "I (지금 달리고 있지 않다).",
    options: ["I am not running.","I not am running.","I don't running.","I doesn't running."], answer: 0 },
  { badge: "부정문", badgeClass: "badge-neg",
    q: "알맞은 부정문을 고르세요.", sub: "She (지금 자고 있지 않다).",
    options: ["She not sleeping.","She don't sleeping.","She is not sleeping.","She aren't sleeping."], answer: 2 },
  { badge: "부정문", badgeClass: "badge-neg",
    q: "알맞은 부정문을 고르세요.", sub: "They (지금 공부하고 있지 않다).",
    options: ["They isn't studying.","They are not studying.","They don't studying.","They not are studying."], answer: 1 },
  { badge: "부정문", badgeClass: "badge-neg",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "He ___ watching TV now.",
    options: ["don't","doesn't","isn't","aren't"], answer: 2 },
  { badge: "부정문", badgeClass: "badge-neg",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "We ___ playing soccer now.",
    options: ["isn't","don't","doesn't","aren't"], answer: 3 },
  { badge: "부정문", badgeClass: "badge-neg",
    q: "다음 중 올바른 부정문은?", sub: "",
    options: ["I am not eat now.","She is not dancing.","He are not swimming.","They is not running."], answer: 1 },

  // ─── 의문문 (25~30) ──────────────────────────
  { badge: "의문문", badgeClass: "badge-que",
    q: "알맞은 의문문을 고르세요.", sub: "(너는 지금 뭘 하고 있니?)",
    options: ["What are you doing now?","What you are doing now?","What do you doing now?","Are what you doing?"], answer: 0 },
  { badge: "의문문", badgeClass: "badge-que",
    q: "알맞은 의문문을 고르세요.", sub: "(그는 지금 자고 있니?)",
    options: ["Does he sleeping now?","Is he sleeping now?","Are he sleeping now?","Do he sleeping now?"], answer: 1 },
  { badge: "의문문", badgeClass: "badge-que",
    q: "알맞은 의문문을 고르세요.", sub: "(그들은 지금 뛰고 있니?)",
    options: ["Do they running now?","Is they running now?","Are they running now?","Does they running now?"], answer: 2 },
  { badge: "의문문", badgeClass: "badge-que",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "___ she playing the piano now?",
    options: ["Do","Does","Is","Are"], answer: 2 },
  { badge: "의문문", badgeClass: "badge-que",
    q: "빈칸에 알맞은 말을 고르세요.", sub: "___ you watching TV now?",
    options: ["Do","Does","Is","Are"], answer: 3 },
  { badge: "의문문", badgeClass: "badge-que",
    q: "다음 의문문의 알맞은 대답을 고르세요.", sub: "Is he swimming now?",
    options: ["Yes, he does.","Yes, he is.","Yes, he swims.","Yes, he was."], answer: 1 },
];

let currentQ = 0, score = 0, answered = false;

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled = !(name && cls);
}

function startTest() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent = name + ' · ' + cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionNum').textContent = 'Q' + (currentQ + 1);
  const badge = document.getElementById('questionBadge');
  badge.textContent = q.badge;
  badge.className = 'question-badge ' + q.badgeClass;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionSub').textContent = q.sub;
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / 30';
  document.getElementById('progressScore').textContent = '점수: ' + score;
  document.getElementById('progressFill').style.width = (currentQ / 30 * 100) + '%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = ['①','②','③','④'][i] + ' ' + opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedbackArea');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback wrong';
    fb.textContent = '❌ 틀렸어요. 정답은 ' + ['①','②','③','④'][q.answer] + ' ' + q.options[q.answer] + ' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = currentQ < 29 ? '다음 문제 →' : '결과 보기 🎉';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 30) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const name = document.getElementById('studentName').value.trim();
  const pct = Math.round(score / 30 * 100);
  document.getElementById('resultName').textContent = name + '의 결과';
  document.getElementById('resultScore').textContent = score + ' / 30';
  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 현재진행형 마스터! 정말 대단해요! 👏'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금만 더 연습하면 완벽해질 거예요!'; }
  else if (pct >= 50) { emoji = '🙂'; msg = '절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.'; }
  else { emoji = '📚'; msg = '조금 더 열심히 공부해봐요! 다시 도전해보세요!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
}

function retryTest() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}
</script>
</body>
</html>
