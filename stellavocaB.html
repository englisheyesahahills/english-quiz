<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>능률VOCA 초등 기본 단어 학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f0fdf4;color:#1a1a1a;min-height:100vh;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(5,150,105,0.12);}
.login-logo{font-size:44px;text-align:center;margin-bottom:8px;}
.login-title{font-size:20px;font-weight:800;text-align:center;color:#065f46;margin-bottom:4px;}
.login-sub{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:24px;}
.lbl{font-size:13px;font-weight:700;color:#475569;display:block;margin-bottom:6px;}
.linput{width:100%;padding:13px 14px;font-size:15px;border:1.5px solid #e2e8f0;border-radius:10px;outline:none;margin-bottom:14px;background:#f0fdf4;}
.linput:focus{border-color:#10b981;}
.class-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.cbtn{padding:10px 0;font-size:14px;font-weight:700;border:2px solid #e2e8f0;border-radius:10px;background:#f0fdf4;cursor:pointer;color:#475569;transition:all .12s;}
.cbtn.sel{background:#10b981;color:#fff;border-color:#10b981;}
.go-btn{width:100%;padding:15px;font-size:16px;font-weight:800;background:linear-gradient(135deg,#10b981,#065f46);color:#fff;border:none;border-radius:12px;cursor:pointer;}
.go-btn:disabled{background:#cbd5e1;cursor:default;}

.main-hd{background:linear-gradient(135deg,#10b981,#065f46);color:#fff;padding:20px;}
.main-hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.main-hd h1{font-size:18px;font-weight:800;}
.ubadge{font-size:13px;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:99px;font-weight:700;}
.main-hd p{font-size:12px;opacity:.8;margin-top:4px;}
.day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;max-width:520px;margin:0 auto;}
.day-card{background:#fff;border-radius:12px;padding:14px 10px;cursor:pointer;border:2px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .15s;text-align:center;}
.day-card:hover{border-color:#10b981;background:#f0fdf4;}
.day-num{font-size:13px;font-weight:800;color:#065f46;margin-bottom:2px;}
.day-cnt{font-size:11px;color:#94a3b8;}
.day-done{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;background:#dcfce7;color:#16a34a;margin-top:4px;display:inline-block;}

.screen-hd{background:linear-gradient(135deg,#10b981,#065f46);color:#fff;padding:16px 20px;}
.screen-hd-top{display:flex;align-items:center;gap:10px;}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;width:34px;height:34px;border-radius:8px;cursor:pointer;flex-shrink:0;}
.screen-title{font-size:16px;font-weight:700;}

.learn-wrap{max-width:520px;margin:0 auto;padding:16px;}
.mode-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;}
.tab-btn{padding:9px 4px;font-size:12px;font-weight:700;border:2px solid #a7f3d0;border-radius:10px;background:#fff;cursor:pointer;color:#065f46;transition:all .12s;text-align:center;}
.tab-btn.active{background:#10b981;color:#fff;border-color:#10b981;}

.word-card{background:#fff;border-radius:20px;padding:32px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.wc-day{font-size:11px;color:#10b981;font-weight:700;margin-bottom:8px;}
.wc-en{font-size:36px;font-weight:900;color:#065f46;margin-bottom:8px;}
.wc-type{font-size:12px;color:#94a3b8;margin-bottom:12px;}
.wc-kr{font-size:20px;font-weight:700;color:#1a1a1a;}
.wc-hint{font-size:12px;color:#94a3b8;margin-top:8px;}
.speak-btn{background:linear-gradient(135deg,#10b981,#065f46);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;width:100%;}
.nav-btns{display:flex;gap:10px;margin-bottom:16px;}
.nav-btn{flex:1;padding:12px;font-size:14px;font-weight:700;border:2px solid #a7f3d0;border-radius:11px;background:#fff;cursor:pointer;color:#065f46;}
.nav-btn.primary{background:linear-gradient(135deg,#10b981,#065f46);color:#fff;border-color:#10b981;}
.nav-btn:disabled{opacity:.4;cursor:default;}
.prog-info{text-align:center;font-size:13px;color:#888;margin-bottom:6px;}
.prog-bar2{height:5px;background:#a7f3d0;border-radius:99px;margin-bottom:16px;}
.prog-fill2{height:100%;background:#10b981;border-radius:99px;transition:width .4s;}

.test-q{background:#fff;border-radius:14px;padding:20px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.test-q-num{font-size:11px;color:#10b981;font-weight:700;margin-bottom:6px;}
.test-q-word{font-size:24px;font-weight:900;color:#065f46;margin-bottom:4px;}
.test-q-type{font-size:12px;color:#94a3b8;}
.test-opts{display:flex;flex-direction:column;gap:9px;}
.test-opt{width:100%;padding:12px 14px;font-size:14px;font-weight:500;background:#f0fdf4;border:1.5px solid #a7f3d0;border-radius:11px;cursor:pointer;text-align:left;transition:all .12s;color:#1a1a1a;}
.test-opt:hover:not(:disabled){background:#d1fae5;border-color:#10b981;}
.test-opt.correct{background:#e6f9f0;border-color:#25a56a;color:#1a6640;font-weight:700;}
.test-opt.wrong{background:#fff0f0;border-color:#f87171;color:#b91c1c;}
.test-opt:disabled{cursor:default;}
.test-fb{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:8px;}
.test-fb.ok{background:#e6f9f0;color:#1a6640;}
.test-fb.ng{background:#fff0f0;color:#b91c1c;}
.next-btn2{width:100%;padding:13px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#10b981,#065f46);color:#fff;border:none;border-radius:11px;cursor:pointer;}

.subj-wrap{background:#fff;border-radius:14px;padding:20px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.subj-q{font-size:22px;font-weight:900;color:#065f46;margin-bottom:4px;text-align:center;}
.subj-type{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:16px;}
.subj-input{width:100%;padding:13px 14px;font-size:16px;border:1.5px solid #a7f3d0;border-radius:10px;outline:none;margin-bottom:10px;text-align:center;}
.subj-input:focus{border-color:#10b981;}
.subj-check{width:100%;padding:12px;font-size:14px;font-weight:700;background:#10b981;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-bottom:8px;}

.shadow-card{background:#fff;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;}
.shadow-en{font-size:32px;font-weight:900;color:#065f46;margin-bottom:6px;}
.shadow-kr{font-size:18px;color:#475569;margin-bottom:20px;}
.shadow-btns{display:flex;gap:10px;margin-bottom:12px;}
.sh-btn{flex:1;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:11px;cursor:pointer;}
.sh-listen{background:linear-gradient(135deg,#10b981,#065f46);color:#fff;}
.sh-record{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;}
.sh-record.recording{background:linear-gradient(135deg,#f97316,#ea580c);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.sh-result{padding:12px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:10px;line-height:1.5;}
.sh-result.ok{background:#e6f9f0;color:#1a6640;}
.sh-result.ng{background:#fff0f0;color:#b91c1c;}
.sh-result.info{background:#eff6ff;color:#1e40af;}

.result-body{padding:24px 16px;}
.result-box{background:#fff;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.r-emoji{font-size:50px;margin-bottom:10px;}
.r-score{font-size:48px;font-weight:900;color:#10b981;}
.r-sub{font-size:13px;color:#888;margin-bottom:14px;}
.r-msg{font-size:14px;padding:12px;background:#f0fdf4;border-radius:10px;margin-bottom:16px;color:#444;line-height:1.6;}
.save-status{font-size:12px;color:#16a34a;font-weight:700;margin-bottom:12px;min-height:18px;}
.r-btns{display:flex;gap:10px;}
.r-retry{flex:1;padding:13px;font-size:14px;font-weight:700;background:#f0fdf4;color:#10b981;border:2px solid #10b981;border-radius:11px;cursor:pointer;}
.r-home{flex:1;padding:13px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#10b981,#065f46);color:#fff;border:none;border-radius:11px;cursor:pointer;}

.hidden{display:none;}
</style>
</head>

    <div class="login-logo">📗</div>

    <button class="go-btn" id="loginBtn" disabled onclick="doLogin()">시작하기 →</button>
  </div>
</div>

<div id="mainScreen" class="hidden">
  <div class="main-hd">
    <div class="main-hd-top"><h1>📗 능률VOCA 초등 기본</h1><div class="ubadge" id="ubadge"></div></div>
    <p>DAY를 선택해서 단어를 학습해요!</p>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<div id="learnScreen" class="hidden">
  <div class="screen-hd">
    <div class="screen-hd-top">
      <button class="back-btn" onclick="goMain()">←</button>
      <div class="screen-title" id="learnTitle"></div>
    </div>
  </div>
  <div class="learn-wrap">
    <div class="mode-tabs">
      <button class="tab-btn active" id="tab0" onclick="setMode(0)">📖 학습</button>

      <button class="tab-btn" id="tab2" onclick="setMode(2)">✏️ 주관식</button>
      <button class="tab-btn" id="tab3" onclick="setMode(3)">🎤 쉐도잉</button>
    </div>
    <div id="modeContent"></div>
  </div>
</div>

let userName='', userClass='', curDay=0, curIdx=0, curMode=0;

let recognizing=false, speechRec=null;

function getKey(){return 'voca_'+userName+'_'+userClass;}
function getRec(){try{return JSON.parse(localStorage.getItem(getKey())||'{}')}catch(e){return{}}}
function saveRec(d){const r=getRec();r[d]=true;try{localStorage.setItem(getKey(),JSON.stringify(r))}catch(e){}}

function selClass(c){userClass=c;document.querySelectorAll('.cbtn').forEach(b=>{b.classList.toggle('sel',b.textContent===c+'반')});checkLogin();}
function checkLogin(){document.getElementById('loginBtn').disabled=!(document.getElementById('nameInput').value.trim()&&userClass);}
function doLogin(){userName=document.getElementById('nameInput').value.trim();show('mainScreen');hide('loginScreen');renderMain();}

function renderMain(){
  document.getElementById('ubadge').textContent=userName+' · '+userClass+'반';
  const rec=getRec(), grid=document.getElementById('dayGrid');
  grid.innerHTML='';
  Object.keys(days).forEach(d=>{
    const el=document.createElement('div');
    el.className='day-card'; el.onclick=()=>openDay(parseInt(d));
    el.innerHTML='<div class="day-num">DAY '+d+'</div><div class="day-cnt">'+days[d].length+'단어</div>'+(rec[d]?'<div class="day-done">✓ 완료</div>':'');
    grid.appendChild(el);
  });
}
function goMain(){show('mainScreen');hide('learnScreen');renderMain();}

function openDay(d){
  curDay=d; curIdx=0; curMode=0;
  document.getElementById('learnTitle').textContent='DAY '+d+' ('+days[d].length+'단어)';
  hide('mainScreen'); show('learnScreen'); setMode(0);
}

function setMode(m){
  curMode=m;
  [0,1,2,3].forEach(i=>document.getElementById('tab'+i).classList.toggle('active',i===m));
  if(m===0)renderLearn();
  else if(m===1)startMCTest();
  else if(m===2)startSubjTest();
  else startShadow();
}

function renderLearn(){
  const ws=days[curDay], w=ws[curIdx];
  const pct=((curIdx+1)/ws.length*100).toFixed(0);
  document.getElementById('modeContent').innerHTML=
    '<div class="prog-info">'+(curIdx+1)+' / '+ws.length+'</div>'+
    '<div class="prog-bar2"><div class="prog-fill2" style="width:'+pct+'%"></div></div>'+
    '<div class="word-card" onclick="toggleMeaning()">'+
      '<div class="wc-day">DAY '+curDay+'</div>'+
      '<div class="wc-en">'+w.en+'</div>'+
      '<div class="wc-type">['+w.type+']</div>'+
      '<div class="wc-kr hidden" id="krText">'+w.kr+'</div>'+
      '<div class="wc-hint" id="hintText">카드를 탭하면 뜻이 나와요 👆</div>'+
    '</div>'+
    '<button class="speak-btn" onclick="speak(\''+w.en+'\')">🔊 발음 듣기 (탭하세요)</button>'+
    '<div class="nav-btns">'+
      '<button class="nav-btn" onclick="prevWord()" '+(curIdx===0?'disabled':'')+'>← 이전</button>'+
      '<button class="nav-btn primary" onclick="nextWord()">'+(curIdx<ws.length-1?'다음 →':'✅ 완료')+'</button>'+
    '</div>';
}

function toggleMeaning(){
  document.getElementById('krText').classList.toggle('hidden');
  document.getElementById('hintText').classList.toggle('hidden');
}
function prevWord(){if(curIdx>0){curIdx--;renderLearn();}}
function nextWord(){
  if(curIdx<days[curDay].length-1){curIdx++;renderLearn();}
  else{saveRec(curDay);alert('🎉 DAY '+curDay+' 학습 완료!');}
}
function speak(w){
  try{
    window._pendingSpeak=w;
    speechSynthesis.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(window._pendingSpeak||w);
      u.lang='en-US'; u.rate=0.85; u.volume=1; u.pitch=1;
      const voices=speechSynthesis.getVoices();
      const enVoice=voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang.startsWith('en'));
      if(enVoice) u.voice=enVoice;
      speechSynthesis.speak(u);
    }, 100);
  }catch(e){console.log('TTS:',e);}
}
// 음성 목록 미리 로드 (iOS 필수)
if(typeof speechSynthesis!=='undefined'){
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());
}

function startMCTest(){
  testWords=[...days[curDay]].sort(()=>Math.random()-.5);
  testQ=0;testScore=0;testAnswered=false;renderMCQ();
}
function renderMCQ(){
  if(testQ>=testWords.length){showResult('객관식');return;}
  const w=testWords[testQ];
  const wrong=days[curDay].filter(x=>x.en!==w.en).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...wrong,w].sort(()=>Math.random()-.5);
  window._mcOpts=opts; window._mcAns=w.en;
  const pct=(testQ/testWords.length*100).toFixed(0);
  document.getElementById('modeContent').innerHTML=
    '<div class="prog-info">Q'+(testQ+1)+' / '+testWords.length+' &nbsp;|&nbsp; 점수: '+testScore+'</div>'+
    '<div class="prog-bar2"><div class="prog-fill2" style="width:'+pct+'%"></div></div>'+
    '<div class="test-q"><div class="test-q-num">Q'+(testQ+1)+'</div><div class="test-q-word">'+w.en+'</div><div class="test-q-type">['+w.type+']</div></div>'+
    '<div class="test-opts">'+opts.map((o,i)=>'<button class="test-opt" onclick="selMC('+i+',\''+o.en+'\')" id="opt'+i+'">'+['①','②','③','④'][i]+' '+o.kr+'</button>').join('')+'</div>'+
    '<div class="test-fb hidden" id="mcFb"></div>'+
    '<button class="next-btn2 hidden" id="mcNext" onclick="nextMCQ()">'+(testQ<testWords.length-1?'다음 →':'결과 보기 🎉')+'</button>';
}
function selMC(i,en){
  if(testAnswered)return; testAnswered=true;
  const btns=document.querySelectorAll('.test-opt'); btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('mcFb'); fb.classList.remove('hidden');
  if(en===window._mcAns){testScore++;btns[i].classList.add('correct');fb.className='test-fb ok';fb.textContent='✅ 정답! 잘했어요!';speak(window._mcAns);}
  else{btns[i].classList.add('wrong');btns[window._mcOpts.findIndex(o=>o.en===window._mcAns)].classList.add('correct');fb.className='test-fb ng';fb.textContent='❌ 틀렸어요. 정답: '+window._mcOpts.find(o=>o.en===window._mcAns).kr;}
  document.getElementById('mcNext').classList.remove('hidden');
}
function nextMCQ(){testQ++;testAnswered=false;renderMCQ();}

function startSubjTest(){

      '<div class="subj-q">'+w.kr+'</div>'+

    '<div class="test-fb hidden" id="subjFb"></div>'+
    '<button class="next-btn2 hidden" id="subjNext" onclick="nextSubjQ()">'+(testQ<testWords.length-1?'다음 →':'결과 보기 🎉')+'</button>';
  setTimeout(()=>document.getElementById('subjInput')?.focus(),100);
}
function checkSubj(){
  if(testAnswered)return; testAnswered=true;
  const inp=document.getElementById('subjInput');
  const val=inp.value.trim().toLowerCase();
  inp.disabled=true;
  const fb=document.getElementById('subjFb'); fb.classList.remove('hidden');
  document.getElementById('subjNext').classList.remove('hidden');
  document.getElementById('subjNext').addEventListener('click',function(){nextSubjQ();});
  if(val===window._subjAns.toLowerCase()){
    testScore++;inp.style.borderColor='#25a56a';inp.style.background='#e6f9f0';
    fb.className='test-fb ok';fb.textContent='✅ 정답! 잘했어요!';speak(window._subjAns);
  }else{
    inp.style.borderColor='#f87171';inp.style.background='#fff0f0';
    fb.className='test-fb ng';fb.textContent='❌ 틀렸어요. 정답: '+window._subjAns;
  }
}
function nextSubjQ(){testQ++;testAnswered=false;renderSubjQ();}

function startShadow(){
  testWords=[...days[curDay]].sort(()=>Math.random()-.5);
  testQ=0;testScore=0;renderShadow();
}
function renderShadow(){
  if(testQ>=testWords.length){showResult('쉐도잉');return;}
  const w=testWords[testQ];
  const pct=(testQ/testWords.length*100).toFixed(0);
  document.getElementById('modeContent').innerHTML=
    '<div class="prog-info">'+(testQ+1)+' / '+testWords.length+' &nbsp;|&nbsp; 점수: '+testScore+'</div>'+
    '<div class="prog-bar2"><div class="prog-fill2" style="width:'+pct+'%"></div></div>'+
    '<div class="shadow-card">'+
      '<div class="shadow-en">'+w.en+'</div>'+
      '<div class="shadow-kr">'+w.kr+' ['+w.type+']</div>'+
      '<div class="shadow-btns">'+
        '<button class="sh-btn sh-listen" onclick="speak(\''+w.en+'\')">🔊 듣기</button>'+
        '<button class="sh-btn sh-record" id="recBtn" onclick="toggleRec(\''+w.en+'\')">🎤 따라 말하기</button>'+
      '</div>'+
      '<div class="sh-result info" id="shResult">🔊 먼저 발음을 듣고, 🎤 버튼을 눌러 따라 말해보세요!</div>'+
    '</div>'+
    '<button class="next-btn2" onclick="nextShadow()">'+(testQ<testWords.length-1?'다음 단어 →':'결과 보기 🎉')+'</button>';
  speak(w.en);
}
function toggleRec(word){
  if(!('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){
    document.getElementById('shResult').textContent='⚠️ Chrome 브라우저에서만 음성 인식이 돼요!'; return;
  }
  if(recognizing){speechRec&&speechRec.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  speechRec=new SR(); speechRec.lang='en-US'; speechRec.interimResults=false;
  const btn=document.getElementById('recBtn');
  btn.classList.add('recording'); btn.textContent='⏹ 말하는 중...'; recognizing=true;
  speechRec.onresult=(e)=>{
    const said=e.results[0][0].transcript.toLowerCase().trim();
    const correct=word.toLowerCase();
    btn.classList.remove('recording'); btn.textContent='🎤 따라 말하기'; recognizing=false;
    const res=document.getElementById('shResult');
    if(said===correct||said.includes(correct)||correct.includes(said)){
      testScore++;res.className='sh-result ok';res.textContent='✅ 잘했어요! "'+said+'" 정확해요! 👏';
    }else{res.className='sh-result ng';res.textContent='❌ 다시 도전! 내가 들은 것: "'+said+'" / 정답: "'+word+'"';}
  };
  speechRec.onerror=()=>{
    btn.classList.remove('recording'); btn.textContent='🎤 따라 말하기'; recognizing=false;
    document.getElementById('shResult').textContent='⚠️ 음성을 인식하지 못했어요. 다시 시도해보세요!';
  };
  speechRec.start();
}
function nextShadow(){testQ++;renderShadow();}

function showResult(mode){
  saveRec(curDay);
  const total=testWords.length, pct=Math.round(testScore/total*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='완벽해요! 단어 마스터! 👏';}
  else if(pct>=70){emoji='😊';msg='잘했어요! 조금 더 연습하면 완벽해질 거예요!';}
  else if(pct>=50){emoji='🙂';msg='절반 이상 맞혔어요! 틀린 단어를 다시 복습해봐요!';}
  else{emoji='📚';msg='다시 한 번 단어 학습하고 도전해봐요!';}
  document.getElementById('modeContent').innerHTML=
    '<div class="result-body"><div class="result-box">'+
      '<div class="r-emoji">'+emoji+'</div>'+
      '<div style="font-size:13px;color:#64748b;margin-bottom:4px;">DAY '+curDay+' · '+mode+'</div>'+
      '<div class="r-score">'+testScore+' / '+total+'</div>'+
      '<div class="r-sub">'+total+'문제 중 '+testScore+'개 정답 ('+pct+'%)</div>'+
      '<div class="r-msg">'+msg+'</div>'+
      '<div class="save-status" id="saveStatus">📊 결과 저장 중...</div>'+
      '<div class="r-btns">'+
        '<button class="r-retry" onclick="setMode('+curMode+')">다시 풀기 🔄</button>'+
        '<button class="r-home" onclick="goMain()">DAY 목록 🏠</button>'+
      '</div>'+
    '</div></div>';
  sendScore(mode, testScore, total);
}

async function sendScore(mode, score, total){
  const now=new Date();
  const dt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  try{
    const p=new URLSearchParams({name:userName,class:userClass+'반',unit:'VOCA DAY'+curDay+' '+mode,score:score,datetime:dt});
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:p.toString()});
    const el=document.getElementById('saveStatus');
    if(el) el.textContent='✅ 저장됐어요!';
  }catch(e){
    const el=document.getElementById('saveStatus');
    if(el) el.textContent='⚠️ 저장 실패. 인터넷 연결을 확인해주세요.';
  }
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
</script>
