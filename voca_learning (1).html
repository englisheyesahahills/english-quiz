<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보카클리어 중학 기본편 학습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --green-dark: #1a4a2e;
    --green-main: #2d7a4f;
    --green-light: #4caf7d;
    --green-pale: #e8f5ee;
    --green-mist: #f0faf4;
    --accent: #ff6b35;
    --accent-soft: #fff3ee;
    --gold: #f0a500;
    --gray-900: #111827;
    --gray-700: #374151;
    --gray-500: #6b7280;
    --gray-300: #d1d5db;
    --gray-100: #f3f4f6;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(45,122,79,0.10);
    --shadow-lg: 0 8px 40px rgba(45,122,79,0.18);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: var(--green-mist);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-main) 100%);
    color: white;
    padding: 20px 24px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .header-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 28px; }
  .logo-text h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .logo-text p { font-size: 11px; opacity: 0.75; font-weight: 300; }
  .header-stats { display: flex; gap: 16px; }
  .stat-pill {
    background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill span { opacity: 0.75; }

  /* ── STUDENT FORM ── */
  .student-bar {
    background: white; border-bottom: 1px solid var(--gray-300);
    padding: 12px 24px;
  }
  .student-bar-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .student-bar input, .student-bar select {
    border: 1.5px solid var(--gray-300); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .student-bar input:focus, .student-bar select:focus {
    border-color: var(--green-main);
  }
  .student-bar input { width: 120px; }
  .student-bar label { font-size: 12px; color: var(--gray-500); font-weight: 500; }
  .save-btn {
    background: var(--green-main); color: white; border: none;
    border-radius: 8px; padding: 8px 16px; font-size: 13px;
    font-family: inherit; font-weight: 600; cursor: pointer;
    transition: background 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .save-btn:hover { background: var(--green-dark); }
  .save-status { font-size: 12px; color: var(--green-main); font-weight: 500; }

  /* ── DAY NAV ── */
  .day-nav {
    background: white; padding: 12px 24px;
    border-bottom: 1px solid var(--gray-300);
    overflow-x: auto;
  }
  .day-nav-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; gap: 6px; align-items: center;
  }
  .day-nav-label { font-size: 11px; font-weight: 700; color: var(--gray-500);
    text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; margin-right: 4px; }
  .day-btn {
    border: 1.5px solid var(--gray-300); background: white;
    border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; color: var(--gray-700);
    font-family: inherit;
  }
  .day-btn:hover { border-color: var(--green-main); color: var(--green-main); }
  .day-btn.active {
    background: var(--green-main); border-color: var(--green-main); color: white;
  }
  .day-btn.all-btn {
    background: var(--green-dark); border-color: var(--green-dark); color: white;
  }

  /* ── MODE TABS ── */
  .mode-tabs {
    max-width: 900px; margin: 20px auto 0; padding: 0 24px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .mode-tab {
    display: flex; align-items: center; gap: 8px;
    border: 2px solid var(--gray-300); border-radius: 12px;
    padding: 10px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; background: white; color: var(--gray-700);
    transition: all 0.2s; font-family: inherit;
  }
  .mode-tab .tab-icon { font-size: 18px; }
  .mode-tab:hover { border-color: var(--green-light); color: var(--green-main); }
  .mode-tab.active {
    background: var(--green-main); border-color: var(--green-main);
    color: white; box-shadow: var(--shadow);
  }

  /* ── MAIN ── */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 24px 60px; }

  /* ── FLASHCARD VIEW ── */
  .flashcard-area { text-align: center; }
  .card-counter { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; font-weight: 500; }
  .flashcard {
    background: white; border-radius: 24px; padding: 48px 36px;
    box-shadow: var(--shadow-lg); cursor: pointer;
    min-height: 260px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: transform 0.15s; position: relative; overflow: hidden;
    border: 2px solid transparent;
  }
  .flashcard:hover { transform: translateY(-2px); border-color: var(--green-light); }
  .flashcard::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--green-main), var(--green-light));
  }
  .card-day-badge {
    position: absolute; top: 16px; left: 16px;
    background: var(--green-pale); color: var(--green-dark);
    border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 700;
  }
  .card-english { font-size: 42px; font-weight: 900; color: var(--green-dark);
    font-family: 'Inter', sans-serif; letter-spacing: -1px; }
  .card-hint { font-size: 13px; color: var(--gray-500); font-style: italic; }
  .card-korean {
    font-size: 24px; font-weight: 700; color: var(--green-main);
    border-top: 1.5px solid var(--green-pale); padding-top: 16px; width: 100%;
    text-align: center; display: none;
  }
  .card-korean.show { display: block; }
  .card-tap-hint { font-size: 12px; color: var(--gray-400); margin-top: 8px; }
  .speak-btn-card {
    background: var(--green-pale); border: none; border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .speak-btn-card:hover { background: var(--green-light); }
  .card-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; }
  .card-nav-btn {
    background: white; border: 2px solid var(--gray-300); border-radius: 12px;
    padding: 10px 24px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; font-family: inherit; color: var(--gray-700);
  }
  .card-nav-btn:hover { border-color: var(--green-main); color: var(--green-main); }
  .card-nav-btn.primary {
    background: var(--green-main); border-color: var(--green-main); color: white;
  }

  /* ── WORD LIST VIEW ── */
  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-row {
    background: white; border-radius: var(--radius-sm); padding: 14px 18px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); transition: box-shadow 0.15s;
    border: 1.5px solid transparent;
  }
  .word-row:hover { box-shadow: var(--shadow); border-color: var(--green-pale); }
  .word-num { font-size: 11px; color: var(--gray-400); font-weight: 700;
    width: 28px; text-align: right; flex-shrink: 0; }
  .word-en { font-size: 16px; font-weight: 700; color: var(--green-dark);
    font-family: 'Inter', sans-serif; flex: 1; }
  .word-kr { font-size: 13px; color: var(--gray-600); flex: 1; }
  .word-row .speak-btn {
    background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5;
    transition: opacity 0.15s; padding: 4px;
  }
  .word-row .speak-btn:hover { opacity: 1; }
  .day-group-header {
    background: linear-gradient(90deg, var(--green-dark), var(--green-main));
    color: white; border-radius: var(--radius-sm); padding: 10px 18px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }

  /* ── QUIZ VIEWS ── */
  .quiz-area {}
  .quiz-header { text-align: center; margin-bottom: 24px; }
  .quiz-progress-bar {
    background: var(--gray-200); border-radius: 99px; height: 6px;
    margin-bottom: 16px; overflow: hidden;
  }
  .quiz-progress-fill {
    background: linear-gradient(90deg, var(--green-main), var(--green-light));
    height: 100%; border-radius: 99px; transition: width 0.4s;
  }
  .quiz-question-card {
    background: white; border-radius: 20px; padding: 40px 32px;
    box-shadow: var(--shadow-lg); text-align: center; margin-bottom: 20px;
    border: 2px solid transparent; position: relative; overflow: hidden;
  }
  .quiz-question-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
  }
  .quiz-q-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--gray-500); margin-bottom: 12px; }
  .quiz-question { font-size: 36px; font-weight: 900; color: var(--green-dark);
    font-family: 'Inter', sans-serif; }
  .quiz-question-kr { font-size: 18px; font-weight: 600; color: var(--gray-700); }
  .speak-btn-quiz {
    background: var(--green-pale); border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; cursor: pointer; margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    color: var(--green-dark); font-weight: 600; transition: background 0.2s;
  }
  .speak-btn-quiz:hover { background: var(--green-light); color: white; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-option {
    background: white; border: 2px solid var(--gray-300); border-radius: 12px;
    padding: 16px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; text-align: left; font-family: inherit; color: var(--gray-700);
    display: flex; align-items: center; gap: 10px;
  }
  .quiz-option .opt-label {
    background: var(--gray-100); border-radius: 6px; padding: 2px 8px;
    font-size: 11px; font-weight: 700; color: var(--gray-500); flex-shrink: 0;
  }
  .quiz-option:hover { border-color: var(--green-main); color: var(--green-dark);
    background: var(--green-mist); }
  .quiz-option.correct { background: var(--green-pale); border-color: var(--green-main);
    color: var(--green-dark); }
  .quiz-option.wrong { background: #fff0f0; border-color: #e53935; color: #c62828; }
  .quiz-option.disabled { pointer-events: none; }
  .quiz-result { text-align: center; padding: 20px; }
  .quiz-result-emoji { font-size: 56px; }
  .quiz-result-score { font-size: 48px; font-weight: 900; color: var(--green-dark); }
  .quiz-result-text { font-size: 16px; color: var(--gray-600); margin-top: 8px; }
  .quiz-result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
  .btn-primary {
    background: var(--green-main); color: white; border: none;
    border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-outline {
    background: white; color: var(--green-main); border: 2px solid var(--green-main);
    border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--green-pale); }

  /* ── SUBJECTIVE QUIZ ── */
  .subjective-input {
    width: 100%; border: 2.5px solid var(--gray-300); border-radius: 12px;
    padding: 16px 20px; font-size: 22px; font-weight: 700;
    font-family: 'Inter', sans-serif; text-align: center; outline: none;
    transition: border-color 0.2s; letter-spacing: 2px;
    color: var(--green-dark);
  }
  .subjective-input:focus { border-color: var(--green-main); }
  .subjective-input.correct { border-color: var(--green-main); background: var(--green-pale); }
  .subjective-input.wrong { border-color: #e53935; background: #fff0f0; }
  .submit-btn {
    width: 100%; background: var(--accent); color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 12px; font-family: inherit;
    transition: background 0.2s; display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: #e55a28; }
  .answer-reveal {
    text-align: center; padding: 12px; font-size: 18px; font-weight: 700;
    border-radius: 10px; margin-top: 10px;
  }
  .answer-reveal.correct { background: var(--green-pale); color: var(--green-dark); }
  .answer-reveal.wrong { background: #fff0f0; color: #c62828; }

  /* ── SHADOWING ── */
  .shadowing-area {}
  .shadow-card {
    background: white; border-radius: 20px; padding: 36px; box-shadow: var(--shadow-lg);
    text-align: center; margin-bottom: 20px;
  }
  .shadow-english { font-size: 48px; font-weight: 900; color: var(--green-dark);
    font-family: 'Inter', sans-serif; margin-bottom: 8px; }
  .shadow-korean { font-size: 20px; color: var(--gray-600); margin-bottom: 24px; }
  .shadow-controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .shadow-btn {
    border: none; border-radius: 12px; padding: 12px 22px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 8px; transition: all 0.2s;
  }
  .shadow-btn.play { background: var(--green-main); color: white; }
  .shadow-btn.play:hover { background: var(--green-dark); }
  .shadow-btn.slow { background: var(--gold); color: white; }
  .shadow-btn.slow:hover { background: #d4930a; }
  .shadow-btn.record { background: var(--accent); color: white; }
  .shadow-btn.record:hover { background: #e55a28; }
  .shadow-btn.record.recording { background: #e53935; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
  .mic-status { font-size: 13px; color: var(--gray-500); margin-top: 12px; height: 20px; }
  .speed-slider { width: 200px; margin-top: 8px; accent-color: var(--green-main); }
  .speed-label { font-size: 12px; color: var(--gray-500); }
  .shadow-count-badge {
    background: var(--green-pale); border-radius: 10px; padding: 8px 16px;
    font-size: 13px; font-weight: 700; color: var(--green-dark); margin-top: 16px;
    display: inline-block;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--gray-900); color: white; border-radius: 12px;
    padding: 12px 24px; font-size: 14px; font-weight: 600;
    z-index: 9999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .quiz-options { grid-template-columns: 1fr; }
    .card-english { font-size: 32px; }
    .shadow-english { font-size: 36px; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📗</div>
      <div class="logo-text">
        <h1>보카클리어 중학 기본편</h1>
        <p>스텔라 영어학원 · DAY 01~40</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-pill"><span>총</span> 1,000단어</div>
      <div class="stat-pill" id="headerScore"><span>오늘 점수</span> –</div>
    </div>
  </div>
</div>

<!-- Student bar -->
<div class="student-bar">
  <div class="student-bar-inner">
    <label>이름</label>
    <input type="text" id="studentName" placeholder="홍길동" maxlength="10">
    <label>반</label>
    <select id="studentClass">
      <option value="">선택</option>
      <option>A반</option><option>B반</option><option>C반</option>
      <option>D반</option><option>E반</option><option>F반</option>
    </select>
    <button class="save-btn" onclick="saveToNotion()">💾 점수 저장</button>
    <span class="save-status" id="saveStatus"></span>
  </div>
</div>

<!-- Day nav -->
<div class="day-nav">
  <div class="day-nav-inner" id="dayNavInner">
    <span class="day-nav-label">DAY</span>
    <button class="day-btn all-btn active" onclick="selectDay(0)">전체</button>
  </div>
</div>

<!-- Mode tabs -->
<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('flashcard')">
    <span class="tab-icon">🃏</span> 플래시카드
  </button>
  <button class="mode-tab" onclick="switchMode('list')">
    <span class="tab-icon">📋</span> 단어목록
  </button>
  <button class="mode-tab" onclick="switchMode('mcq')">
    <span class="tab-icon">🎯</span> 객관식
  </button>
  <button class="mode-tab" onclick="switchMode('subjective')">
    <span class="tab-icon">✏️</span> 주관식
  </button>
  <button class="mode-tab" onclick="switchMode('shadowing')">
    <span class="tab-icon">🎙️</span> 쉐도잉
  </button>
</div>

<div class="main" id="mainArea"></div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// WORD DATA (1000 words, DAY 01~40)
// ══════════════════════════════════════════════════
const WORDS = [
  // DAY 01

let quizAnswered = false;
let shadowIdx = 0;
let shadowCount = {};
let mediaRecorder = null;
let recording = false;
let sessionScore = 0;
let sessionTotal = 0;
let speechSynthUtter = null;

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
function init() {
  // Build day nav
  const nav = document.getElementById('dayNavInner');
  for (let d = 1; d <= 40; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.textContent = d;
    btn.onclick = () => selectDay(d);
    nav.appendChild(btn);
  }
  selectDay(0);
}

function selectDay(day) {
  currentDay = day;
  filteredWords = day === 0 ? [...WORDS] : WORDS.filter(w => w.day === day);
  // Update nav
  document.querySelectorAll('.day-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === day);
  });
  cardIndex = 0; cardFlipped = false;
  quizIdx = 0; quizScore = 0;
  shadowIdx = 0;
  renderMode();
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    const modes = ['flashcard','list','mcq','subjective','shadowing'];
    t.classList.toggle('active', modes[i] === mode);
  });
  quizIdx = 0; quizScore = 0; quizAnswered = false;
  shadowIdx = 0;
  renderMode();
}

function renderMode() {
  const area = document.getElementById('mainArea');
  if (currentMode === 'flashcard') renderFlashcard(area);
  else if (currentMode === 'list') renderList(area);
  else if (currentMode === 'mcq') renderMCQ(area);
  else if (currentMode === 'subjective') renderSubjective(area);
  else if (currentMode === 'shadowing') renderShadowing(area);
}

// ══════════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════════
function speak(text, rate = 1) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = rate; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }
}

// ══════════════════════════════════════════════════
// FLASHCARD
// ══════════════════════════════════════════════════
function renderFlashcard(area) {
  const w = filteredWords[cardIndex];
  if (!w) { area.innerHTML = '<p style="text-align:center;color:#888;padding:40px">단어가 없습니다.</p>'; return; }
  area.innerHTML = `
    <div class="flashcard-area">
      <div class="card-counter">${cardIndex + 1} / ${filteredWords.length}</div>
      <div class="flashcard" onclick="flipCard()" id="mainCard">
        <div class="card-day-badge">DAY ${w.day.toString().padStart(2,'0')}</div>
        <button class="speak-btn-card" onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
        <div class="card-english">${w.en}</div>
        <div class="card-hint">탭하여 뜻 확인</div>
        <div class="card-korean ${cardFlipped ? 'show' : ''}" id="cardKorean">${w.kr}</div>
      </div>
      <div class="card-nav">
        <button class="card-nav-btn" onclick="prevCard()">◀ 이전</button>
        <button class="card-nav-btn primary" onclick="nextCard()">다음 ▶</button>
      </div>
    </div>`;
}

function flipCard() {
  cardFlipped = !cardFlipped;
  const kr = document.getElementById('cardKorean');
  if (kr) kr.classList.toggle('show', cardFlipped);
  const hint = document.querySelector('.card-hint');
  if (hint) hint.style.display = cardFlipped ? 'none' : '';
  if (cardFlipped) speak(filteredWords[cardIndex].en);
}

function nextCard() {
  cardIndex = (cardIndex + 1) % filteredWords.length;
  cardFlipped = false;
  renderFlashcard(document.getElementById('mainArea'));
}

function prevCard() {
  cardIndex = (cardIndex - 1 + filteredWords.length) % filteredWords.length;
  cardFlipped = false;
  renderFlashcard(document.getElementById('mainArea'));
}

// ══════════════════════════════════════════════════
// LIST
// ══════════════════════════════════════════════════
function renderList(area) {
  const byDay = {};
  filteredWords.forEach(w => {
    if (!byDay[w.day]) byDay[w.day] = [];
    byDay[w.day].push(w);
  });
  let html = '<div class="word-list">';
  let num = 1;
  Object.keys(byDay).sort((a,b)=>a-b).forEach(day => {
    html += `<div class="day-group-header">📅 DAY ${String(day).padStart(2,'0')}</div>`;
    byDay[day].forEach(w => {
      html += `<div class="word-row">
        <span class="word-num">${num++}</span>
        <span class="word-en">${w.en}</span>
        <span class="word-kr">${w.kr}</span>
        <button class="speak-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
      </div>`;
    });
  });
  html += '</div>';
  area.innerHTML = html;
}

// ══════════════════════════════════════════════════
// MCQ
// ══════════════════════════════════════════════════
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function buildQuizWords() {
  quizWords = shuffle(filteredWords);
}

function renderMCQ(area) {
  if (quizIdx === 0) buildQuizWords();
  if (quizIdx >= quizWords.length) {
    renderQuizResult(area, 'mcq');
    return;
  }
  const w = quizWords[quizIdx];
  const wrong = shuffle(WORDS.filter(x => x.en !== w.en)).slice(0, 3);
  const options = shuffle([w, ...wrong]);
  const pct = Math.round(quizIdx / quizWords.length * 100);

  area.innerHTML = `
    <div class="quiz-area">
      <div class="quiz-header">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:13px;color:#6b7280">문제 ${quizIdx + 1} / ${quizWords.length} &nbsp;·&nbsp; 점수: <b style="color:var(--green-main)">${quizScore}</b></div>
      </div>
      <div class="quiz-question-card">
        <div class="quiz-q-label">🎯 객관식 — 뜻을 고르세요</div>
        <div class="quiz-question">${w.en}</div>
        <button class="speak-btn-quiz" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊 발음 듣기</button>
      </div>
      <div class="quiz-options" id="quizOptions">
        ${options.map((o, i) => `
          <button class="quiz-option" onclick="checkMCQ(${i}, '${o.en.replace(/'/g,"\\'")}', '${w.en.replace(/'/g,"\\'")}')">
            <span class="opt-label">${['A','B','C','D'][i]}</span>
            ${o.kr}
          </button>`).join('')}
      </div>
    </div>`;
}

function checkMCQ(idx, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const btns = document.querySelectorAll('.quiz-option');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    const text = btn.textContent.trim().replace(/^[A-D]\s*/, '');
    const word = quizWords.find(w => w.kr === text || btn.textContent.includes(w.kr));
  });
  const isCorrect = chosen === correct;
  btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    const correctWord = quizWords[quizIdx];
    btns.forEach(btn => {
      if (btn.textContent.includes(correctWord.kr)) btn.classList.add('correct');
    });
  }
  if (isCorrect) { quizScore++; speak(correct); }
  sessionTotal++;
  if (isCorrect) sessionScore++;
  updateHeaderScore();
  setTimeout(() => {
    quizIdx++;
    quizAnswered = false;
    renderMCQ(document.getElementById('mainArea'));
  }, 1200);
}

// ══════════════════════════════════════════════════
// SUBJECTIVE
// ══════════════════════════════════════════════════
function renderSubjective(area) {
  if (quizIdx === 0) buildQuizWords();
  if (quizIdx >= quizWords.length) {
    renderQuizResult(area, 'subjective');
    return;
  }
  const w = quizWords[quizIdx];
  area.innerHTML = `
    <div class="quiz-area">
      <div class="quiz-header">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${Math.round(quizIdx/quizWords.length*100)}%"></div></div>
        <div style="font-size:13px;color:#6b7280">문제 ${quizIdx + 1} / ${quizWords.length} &nbsp;·&nbsp; 점수: <b style="color:var(--green-main)">${quizScore}</b></div>
      </div>
      <div class="quiz-question-card">
        <div class="quiz-q-label">✏️ 주관식 — 한국어 뜻을 보고 영어 단어를 입력하세요</div>
        <div class="quiz-question-kr">${w.kr}</div>
        <button class="speak-btn-quiz" style="margin-top:8px" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊 힌트 듣기</button>
      </div>
      <input type="text" class="subjective-input" id="subjInput" placeholder="영어 단어 입력..." autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkSubjective('${w.en.replace(/'/g,"\\'")}')" />
      <div id="subjFeedback"></div>
      <button class="submit-btn" onclick="checkSubjective('${w.en.replace(/'/g,"\\'")}')">
        ✅ 확인
      </button>
      <div style="text-align:center;margin-top:12px">
        <button onclick="skipSubjective()" style="background:none;border:none;color:var(--gray-500);font-size:13px;cursor:pointer;text-decoration:underline">건너뛰기</button>
      </div>
    </div>`;
  document.getElementById('subjInput').focus();
}

function checkSubjective(correct) {
  const input = document.getElementById('subjInput');
  const val = input.value.trim().toLowerCase();
  const ans = correct.toLowerCase();
  const isCorrect = val === ans;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  const fb = document.getElementById('subjFeedback');
  fb.innerHTML = `<div class="answer-reveal ${isCorrect?'correct':'wrong'}">
    ${isCorrect ? '🎉 정답!' : `❌ 오답 &nbsp; 정답: <b>${correct}</b>`}
  </div>`;
  if (isCorrect) { quizScore++; speak(correct); }
  sessionTotal++;
  if (isCorrect) sessionScore++;
  updateHeaderScore();
  setTimeout(() => {
    quizIdx++;
    renderSubjective(document.getElementById('mainArea'));
  }, 1500);
}

function skipSubjective() {
  quizIdx++;
  renderSubjective(document.getElementById('mainArea'));
}

// ══════════════════════════════════════════════════
// QUIZ RESULT
// ══════════════════════════════════════════════════
function renderQuizResult(area, mode) {
  const pct = Math.round(quizScore / quizWords.length * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  const msg = pct >= 80 ? '훌륭해요!' : pct >= 60 ? '잘 했어요!' : '다시 도전해 보세요!';
  area.innerHTML = `
    <div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-score">${quizScore} / ${quizWords.length}</div>
      <div style="font-size:32px;font-weight:900;color:var(--accent)">${pct}점</div>
      <div class="quiz-result-text">${msg}</div>
      <div class="quiz-result-actions">
        <button class="btn-primary" onclick="quizIdx=0;quizScore=0;renderMode()">🔄 다시 풀기</button>
        <button class="btn-outline" onclick="saveToNotion()">💾 점수 저장</button>
      </div>
    </div>`;
  // Auto-fill score
  document.getElementById('headerScore').innerHTML = `<span>점수</span> ${pct}점`;
}

// ══════════════════════════════════════════════════
// SHADOWING
// ══════════════════════════════════════════════════
function renderShadowing(area) {
  const words = shuffle(filteredWords);
  const w = words[shadowIdx % words.length];
  const count = shadowCount[w.en] || 0;
  area.innerHTML = `
    <div class="shadowing-area">
      <div style="text-align:center;margin-bottom:16px;font-size:13px;color:var(--gray-500)">
        단어 ${(shadowIdx % words.length) + 1} / ${words.length}
        &nbsp;|&nbsp; 전체 연습 횟수: <b style="color:var(--green-main)">${Object.values(shadowCount).reduce((a,b)=>a+b,0)}</b>회
      </div>
      <div class="shadow-card">
        <div class="card-day-badge" style="position:static;display:inline-block;margin-bottom:12px">DAY ${w.day.toString().padStart(2,'0')}</div>
        <div class="shadow-english">${w.en}</div>
        <div class="shadow-korean">${w.kr}</div>
        <div class="shadow-count-badge">🎙️ 이 단어 연습: ${count}회</div>
        <div style="margin-top:12px">
          <label class="speed-label">🐢 속도</label>
          <input type="range" class="speed-slider" id="speedSlider" min="0.5" max="1.2" step="0.1" value="0.8">
          <span id="speedVal" class="speed-label">0.8x</span>
        </div>
      </div>
      <div class="shadow-controls">
        <button class="shadow-btn play" onclick="shadowPlay('${w.en.replace(/'/g,"\\'")}')">
          🔊 원어민 발음
        </button>
        <button class="shadow-btn slow" onclick="shadowPlaySlow('${w.en.replace(/'/g,"\\'")}')">
          🐢 천천히
        </button>
        <button class="shadow-btn record ${recording?'recording':''}" id="recordBtn" onclick="toggleRecord('${w.en.replace(/'/g,"\\'")}')">
          🎙️ ${recording ? '녹음 중...' : '따라 말하기'}
        </button>
      </div>
      <div class="mic-status" id="micStatus"></div>
      <div class="card-nav" style="margin-top:20px">
        <button class="card-nav-btn" onclick="shadowIdx=Math.max(0,shadowIdx-1);renderShadowing(document.getElementById('mainArea'))">◀ 이전</button>
        <button class="card-nav-btn primary" onclick="shadowIdx++;renderShadowing(document.getElementById('mainArea'))">다음 ▶</button>
      </div>
    </div>`;
  const slider = document.getElementById('speedSlider');
  if (slider) {
    slider.addEventListener('input', () => {
      document.getElementById('speedVal').textContent = slider.value + 'x';
    });
  }
}

function shadowPlay(word) {
  const rate = parseFloat(document.getElementById('speedSlider')?.value || 0.8);
  speak(word, rate);
  shadowCount[word] = (shadowCount[word] || 0) + 1;
  const badge = document.querySelector('.shadow-count-badge');
  if (badge) badge.textContent = `🎙️ 이 단어 연습: ${shadowCount[word]}회`;
}

function shadowPlaySlow(word) {
  speak(word, 0.5);
  shadowCount[word] = (shadowCount[word] || 0) + 1;
  const badge = document.querySelector('.shadow-count-badge');
  if (badge) badge.textContent = `🎙️ 이 단어 연습: ${shadowCount[word]}회`;
}

function toggleRecord(word) {
  if (!navigator.mediaDevices) {
    showToast('마이크 권한이 필요합니다.');
    return;
  }
  if (recording) {
    recording = false;
    if (mediaRecorder) mediaRecorder.stop();
    document.getElementById('micStatus').textContent = '✅ 녹음 완료! 원어민 발음과 비교해 보세요.';
    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('recordBtn').textContent = '🎙️ 따라 말하기';
    speak(word, 0.8);
  } else {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
      recording = true;
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.start();
      document.getElementById('micStatus').textContent = '🔴 녹음 중... 단어를 말해 보세요';
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('recordBtn').textContent = '⏹️ 녹음 중...';
      mediaRecorder.addEventListener('stop', () => {
        stream.getTracks().forEach(t => t.stop());
      });
    }).catch(() => {
      showToast('마이크 접근 권한이 없습니다.');
    });
  }
}

// ══════════════════════════════════════════════════
// NOTION SAVE
// ══════════════════════════════════════════════════
async function saveToNotion() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  if (!name) { showToast('이름을 입력해 주세요!'); return; }

  const unit = currentDay === 0 ? '전체' : `DAY ${String(currentDay).padStart(2,'0')}`;
  const score = sessionTotal > 0 ? Math.round(sessionScore / sessionTotal * 100) : quizScore;
  const now = new Date().toISOString().slice(0,16).replace('T',' ');

  document.getElementById('saveStatus').textContent = '저장 중...';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Notion MCP를 사용해서 다음 데이터를 노션 데이터베이스(collection://38bf4df0-1d56-80e9-b4fe-000b1a0241d4)에 저장해줘:
이름: ${name}
반: ${cls || '미입력'}
Unit: ${unit}
점수: ${score}
날짜시간: ${now}

노션 create-pages 툴을 사용해서 저장해줘.`
        }],
        mcp_servers: [{
          type: "url",
          url: "https://mcp.notion.com/mcp",
          name: "notion-mcp"
        }]
      })
    });
    const data = await response.json();
    document.getElementById('saveStatus').textContent = '✅ 저장 완료!';
    showToast(`${name}님 점수(${score}점) 저장 완료!`);
    setTimeout(() => document.getElementById('saveStatus').textContent = '', 3000);
  } catch(e) {
    document.getElementById('saveStatus').textContent = '❌ 저장 실패';
    showToast('저장에 실패했습니다. 직접 기록해 주세요.');
  }
}

function updateHeaderScore() {
  if (sessionTotal > 0) {
    const pct = Math.round(sessionScore / sessionTotal * 100);
    document.getElementById('headerScore').innerHTML = `<span>점수</span> ${pct}점`;
  }
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════
init();
</script>
</body>
