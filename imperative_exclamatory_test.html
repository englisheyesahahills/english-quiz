<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명령문·제안문·감탄문 시험 – 잉글리시아이스쿨관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f0fdf4; color: #1a1a1a; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #059669, #047857); color: #fff; padding: 22px 20px 18px; text-align: center; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header-desc { font-size: 12px; opacity: 0.8; }
  .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #a7f3d0; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #a7f3d0; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=text]:focus, select:focus { border-color: #059669; }
  .start-btn { width: 100%; margin-top: 20px; padding: 15px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #059669, #047857); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .start-btn:disabled { background: #aaa; cursor: default; }

  .progress-wrap { margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-score { font-size: 12px; font-weight: 600; color: #059669; }
  .progress-bar { height: 6px; background: #a7f3d0; border-radius: 99px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #059669, #34d399); border-radius: 99px; transition: width 0.4s ease; }

  .question-card { background: #fff; border-radius: 16px; padding: 22px 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-num { font-size: 11px; color: #059669; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
  .question-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; margin-left: 6px; }
  .badge-imp    { background: #dbeafe; color: #1e40af; }
  .badge-neg    { background: #fce7f3; color: #9d174d; }
  .badge-lets   { background: #d1fae5; color: #065f46; }
  .badge-how    { background: #fef3c7; color: #92400e; }
  .badge-what   { background: #ede9fe; color: #5b21b6; }
  .badge-mixed  { background: #fee2e2; color: #991b1b; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
  .question-sub  { font-size: 15px; color: #333; margin-top: 8px; font-style: italic; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 500; background: #f0fdf4; border: 1.5px solid #a7f3d0; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #1a1a1a; }
  .option-btn:hover:not(:disabled) { background: #d1fae5; border-color: #059669; }
  .option-btn.correct { background: #e6f9f0; border-color: #25a56a; color: #1a6640; font-weight: 700; }
  .option-btn.wrong   { background: #fff0f0; border-color: #f87171; color: #b91c1c; }
  .option-btn:disabled { cursor: default; }

  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .feedback.correct { background: #e6f9f0; color: #1a6640; }
  .feedback.wrong   { background: #fff0f0; color: #b91c1c; }

  .next-btn { width: 100%; margin-top: 14px; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #059669, #047857); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  .result-card { background: #fff; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-score { font-size: 42px; font-weight: 800; color: #059669; margin-bottom: 4px; }
  .result-sub   { font-size: 13px; color: #888; margin-bottom: 20px; }
  .result-msg   { font-size: 15px; color: #444; padding: 14px; background: #f0fdf4; border-radius: 12px; margin-bottom: 20px; }
  .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #059669, #047857); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="startScreen">
  <div class="header">
    <div class="header-sub">ENGLISH TEST</div>
    <div class="header-title">명령문 · 제안문 · 감탄문 시험 📝</div>
    <div class="header-desc">초등 4~5학년 · 30문제 · 객관식</div>
  </div>
  <div class="content">
    <div class="card">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" oninput="checkReady()">
      <label>반</label>
      <select id="studentClass" onchange="checkReady()">
        <option value="">반을 선택하세요</option>
        <option>A반</option><option>B반</option><option>C반</option><option>D반</option>
      </select>
      <button class="start-btn" id="startBtn" disabled onclick="startTest()">시험 시작하기 →</button>
    </div>
  </div>
</div>

<div id="testScreen" class="hidden">
  <div class="header">
    <div class="header-sub" id="headerName"></div>
    <div class="header-title">명령문 · 제안문 · 감탄문</div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 30</span>
        <span class="progress-score" id="progressScore">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;">
        <div class="question-num" id="questionNum">Q1</div>
        <div class="question-badge" id="questionBadge"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="question-sub" id="questionSub"></div>
    </div>
    <div class="options" id="optionsArea"></div>
    <div class="feedback hidden" id="feedbackArea"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<div id="resultScreen" class="hidden">
  <div class="header">
    <div class="header-sub">RESULT</div>
    <div class="header-title">시험 완료! 🎉</div>
  </div>
  <div class="content">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-sub">30문제 중</div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="retry-btn" onclick="retryTest()">다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const questions = [

  // ── 긍정 명령문 (1~6) ────────────────────────────────────
  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"명령문의 형태로 알맞은 것은?", sub:"",
    options:["You open the window.","Opens the window.","Open the window.","Opening the window."], answer:2 },

  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"다음 문장의 뜻으로 알맞은 것은?", sub:"Sit down, please.",
    options:["앉아도 된다.","앉아라.","앉고 있다.","앉을 수 있다."], answer:1 },

  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"손을 씻어라.",
    options:["You wash your hands.","Washing your hands.","Wash your hands.","Washes your hands."], answer:2 },

  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ careful on the road.",
    options:["You are","Is","Be","Are"], answer:2 },

  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"다음 중 올바른 명령문은?", sub:"",
    options:["You be quiet.","Quiets down.","Be quiet.","Being quiet."], answer:2 },

  { badge:"긍정 명령문", badgeClass:"badge-imp",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"네 숙제를 해라.",
    options:["You do your homework.","Does your homework.","Doing your homework.","Do your homework."], answer:3 },

  // ── 부정 명령문 Don't (7~12) ────────────────────────────
  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"부정 명령문의 형태로 알맞은 것은?", sub:"",
    options:["Not run here.","Don't run here.","Doesn't run here.","No run here."], answer:1 },

  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"다음 문장의 뜻으로 알맞은 것은?", sub:"Don't be late.",
    options:["늦어도 된다.","늦지 마라.","늦고 있다.","늦을 수 없다."], answer:1 },

  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"여기서 뛰지 마라.",
    options:["Not run here.","Doesn't run here.","Don't run here.","No running here."], answer:2 },

  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ open that door.",
    options:["Not","Doesn't","Don't","No"], answer:2 },

  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"다음 중 올바른 부정 명령문은?", sub:"",
    options:["Don't touches my bag.","Doesn't touch my bag.","Don't touch my bag.","Not touch my bag."], answer:2 },

  { badge:"부정 명령문", badgeClass:"badge-neg",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"음식을 낭비하지 마라.",
    options:["Don't wastes food.","Not waste food.","Doesn't waste food.","Don't waste food."], answer:3 },

  // ── 제안문 Let's (13~18) ────────────────────────────────
  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"제안문의 형태로 알맞은 것은?", sub:"",
    options:["Let's to play outside.","Let's plays outside.","Let's play outside.","Lets play outside."], answer:2 },

  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"다음 문장의 뜻으로 알맞은 것은?", sub:"Let's eat lunch together.",
    options:["함께 점심을 먹어라.","함께 점심을 먹자.","함께 점심을 먹고 있다.","함께 점심을 먹을 수 있다."], answer:1 },

  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"축구를 하자.",
    options:["Play soccer.","Let's to play soccer.","Let's play soccer.","Let's plays soccer."], answer:2 },

  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ go to the park.",
    options:["Let","Lets","Let's","Let us to"], answer:2 },

  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"다음 중 올바른 제안문은?", sub:"",
    options:["Let's dances together.","Let's to sing a song.","Let's singing now.","Let's take a break."], answer:3 },

  { badge:"제안문 Let's", badgeClass:"badge-lets",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"도서관에서 공부하자.",
    options:["Study in the library.","Let's study in the library.","Let's to study in the library.","Let's studies in the library."], answer:1 },

  // ── How 감탄문 (19~24) ──────────────────────────────────
  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"How 감탄문의 형태로 알맞은 것은?", sub:"",
    options:["How beautiful the flower is!","How a beautiful the flower is!","How beautiful a flower!","What beautiful the flower is!"], answer:0 },

  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"다음 문장의 뜻으로 알맞은 것은?", sub:"How fast he runs!",
    options:["그는 빠르게 달릴 수 있다!","그는 달리기가 매우 빠르다!","그는 빠르게 달려라!","그는 빠르게 달리고 있다!"], answer:1 },

  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ tall she is!",
    options:["What","What a","How","How a"], answer:2 },

  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"이 음식은 정말 맛있구나!",
    options:["What delicious this food is!","How delicious this food is!","How a delicious food!","What a delicious this food!"], answer:1 },

  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"다음 중 올바른 How 감탄문은?", sub:"",
    options:["How a smart he is!","How smart he is!","How smart a he is!","How is smart he!"], answer:1 },

  { badge:"How 감탄문", badgeClass:"badge-how",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"그녀는 정말 열심히 공부하는구나!",
    options:["What hard she studies!","How hard she studies!","How a hard she studies!","What a hard she studies!"], answer:1 },

  // ── What 감탄문 (25~30) ─────────────────────────────────
  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"What 감탄문의 형태로 알맞은 것은?", sub:"",
    options:["What a cute dog it is!","What cute dog it is!","How a cute dog it is!","What a cute dog!  (주어+동사 없이도 OK)"], answer:0 },

  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"다음 문장의 뜻으로 알맞은 것은?", sub:"What a big house it is!",
    options:["정말 큰 집이구나!","큰 집에 가라!","큰 집에서 살자!","얼마나 큰 집이 있니?"], answer:0 },

  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ a pretty flower it is!",
    options:["How","How a","What","What the"], answer:2 },

  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"우리말 뜻에 맞는 영어 문장은?", sub:"정말 재미있는 영화구나!",
    options:["How a fun movie it is!","What fun movie it is!","What a fun movie it is!","How fun a movie it is!"], answer:2 },

  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"다음 중 올바른 What 감탄문은?", sub:"",
    options:["What a nice a day it is!","What nice day it is!","What a nice day it is!","How a nice day it is!"], answer:2 },

  { badge:"What 감탄문", badgeClass:"badge-what",
    q:"How / What 감탄문 중 알맞은 것을 고르세요.", sub:"정말 똑똑한 학생이구나!",
    options:["How a smart student he is!","What smart student he is!","What a smart student he is!","How smart a student he is!"], answer:2 },
];

let currentQ = 0, score = 0, answered = false;

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  const cls  = document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled = !(name && cls);
}

function startTest() {
  const name = document.getElementById('studentName').value.trim();
  const cls  = document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent = name + ' · ' + cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionNum').textContent = 'Q' + (currentQ + 1);
  const badge = document.getElementById('questionBadge');
  badge.textContent = q.badge;
  badge.className   = 'question-badge ' + q.badgeClass;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionSub').textContent  = q.sub;
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / 30';
  document.getElementById('progressScore').textContent = '점수: ' + score;
  document.getElementById('progressFill').style.width  = (currentQ / 30 * 100) + '%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className   = 'option-btn';
    btn.textContent = ['①','②','③','④'][i] + ' ' + opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q    = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedbackArea');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className   = 'feedback correct';
    fb.textContent = '✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className   = 'feedback wrong';
    fb.textContent = '❌ 틀렸어요. 정답은 ' + ['①','②','③','④'][q.answer] + ' ' + q.options[q.answer] + ' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = currentQ < 29 ? '다음 문제 →' : '결과 보기 🎉';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 30) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const name = document.getElementById('studentName').value.trim();
  const pct  = Math.round(score / 30 * 100);
  document.getElementById('resultName').textContent  = name + '의 결과';
  document.getElementById('resultScore').textContent = score + ' / 30';
  let emoji, msg;
  if      (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 명령문·제안문·감탄문 마스터! 👏'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금만 더 연습하면 완벽해질 거예요!'; }
  else if (pct >= 50) { emoji = '🙂'; msg = '절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.'; }
  else                { emoji = '📚'; msg = '조금 더 열심히 공부해봐요! 다시 도전해보세요!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent   = msg;
}

function retryTest() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}
</script>
</body>
</html>
