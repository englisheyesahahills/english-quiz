<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

  .progress-score { font-size: 12px; font-weight: 600; color: #0e7490; }
  .progress-bar { height: 6px; background: #a5f3fc; border-radius: 99px; }

  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }

const NOTION_DS_ID = '388f4df0-1d56-80df-9f14-000b051ef728';

async function saveToNotion(name, cls, score, total) {
  const now = new Date();
  const isoNow = now.toISOString().slice(0, 16);
  const displayTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: '당신은 Notion 저장 도우미입니다. 데이터를 Notion DB에 저장하고 {"success":true} 만 반환하세요.',
        messages: [{
          role: 'user',
          content: `다음 시험 결과를 Notion DB(collection://${NOTION_DS_ID})에 저장해주세요:
이름(title): "${name}"
단원(text): "지시·소유격·목적격 대명사 | ${cls} | ${displayTime}"
총 문제수(number): ${total}
맞은 개수(number): ${score}
제출시간(date): "${isoNow}"`
        }],
        mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion-mcp' }]
      })
    });
    const data = await res.json();
    return data.content && data.content.length > 0;
  } catch(e) {
    console.error('Notion save error:', e);
    return false;
  }
}

let currentQ = 0, score = 0, answered = false;
let _name = '', _cls = '', _total = 30;

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  const cls  = document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled = !(name && cls);
}

function startTest() {
  _name = document.getElementById('studentName').value.trim();
  _cls  = document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent = _name + ' · ' + _cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionNum').textContent = 'Q' + (currentQ + 1);
  const badge = document.getElementById('questionBadge');
  badge.textContent = q.badge;
  badge.className   = 'question-badge ' + q.badgeClass;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionSub').textContent  = q.sub;
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / 30';
  document.getElementById('progressScore').textContent = '점수: ' + score;
  document.getElementById('progressFill').style.width  = (currentQ / 30 * 100) + '%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className   = 'option-btn';
    btn.textContent = ['①','②','③','④'][i] + ' ' + opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q    = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedbackArea');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className   = 'feedback correct';
    fb.textContent = '✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className   = 'feedback wrong';
    fb.textContent = '❌ 틀렸어요. 정답은 ' + ['①','②','③','④'][q.answer] + ' ' + q.options[q.answer] + ' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = currentQ < 29 ? '다음 문제 →' : '결과 보기 🎉';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 30) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const pct = Math.round(score / 30 * 100);
  document.getElementById('resultName').textContent  = _name + '의 결과';
  document.getElementById('resultScore').textContent = score + ' / 30';
  let emoji, msg;
  if      (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 대명사 마스터! 정말 대단해요! 👏'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금만 더 연습하면 완벽해질 거예요!'; }
  else if (pct >= 50) { emoji = '🙂'; msg = '절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.'; }
  else                { emoji = '📚'; msg = '조금 더 열심히 공부해봐요! 다시 도전해보세요!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent   = msg;
}

async function doSave() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 저장 중...';
  const ok = await saveToNotion(_name, _cls, score, _total);
  btn.style.display = 'none';
  if (ok) {
    document.getElementById('saveOk').style.display = 'block';
  } else {
    document.getElementById('saveFail').style.display = 'block';
    btn.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '📊 다시 저장하기';
  }
}

function retryTest() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  // 저장 버튼 초기화
  const btn = document.getElementById('saveBtn');
  btn.style.display = 'block';
  btn.disabled = false;
  btn.textContent = '📊 노션에 결과 저장하기';
  document.getElementById('saveOk').style.display = 'none';
  document.getElementById('saveFail').style.display = 'none';
  currentQ = 0; score = 0;
  showQuestion();
}
</script>
</body>
