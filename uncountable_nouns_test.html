<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>셀 수 없는 명사 시험 – 잉글리시아이스쿨관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #fff8f0; color: #1a1a1a; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #c2410c, #9a3412); color: #fff; padding: 22px 20px 18px; text-align: center; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-title { font-size: 21px; font-weight: 700; margin-bottom: 4px; }
  .header-desc { font-size: 12px; opacity: 0.8; }
  .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #fed7aa; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #fed7aa; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=text]:focus, select:focus { border-color: #c2410c; }
  .start-btn { width: 100%; margin-top: 20px; padding: 15px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #c2410c, #9a3412); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .start-btn:disabled { background: #aaa; cursor: default; }

  .progress-wrap { margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-score { font-size: 12px; font-weight: 600; color: #c2410c; }
  .progress-bar { height: 6px; background: #fed7aa; border-radius: 99px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c2410c, #fb923c); border-radius: 99px; transition: width 0.4s ease; }

  .question-card { background: #fff; border-radius: 16px; padding: 22px 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-num { font-size: 11px; color: #c2410c; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
  .question-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; margin-left: 6px; }
  .badge-material  { background: #dbeafe; color: #1e40af; }
  .badge-proper    { background: #d1fae5; color: #065f46; }
  .badge-abstract  { background: #ede9fe; color: #5b21b6; }
  .badge-mixed     { background: #fef3c7; color: #92400e; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
  .question-sub  { font-size: 15px; color: #333; margin-top: 8px; font-style: italic; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 500; background: #fff8f0; border: 1.5px solid #fed7aa; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #1a1a1a; }
  .option-btn:hover:not(:disabled) { background: #ffedd5; border-color: #c2410c; }
  .option-btn.correct { background: #e6f9f0; border-color: #25a56a; color: #1a6640; font-weight: 700; }
  .option-btn.wrong   { background: #fff0f0; border-color: #f87171; color: #b91c1c; }
  .option-btn:disabled { cursor: default; }

  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .feedback.correct { background: #e6f9f0; color: #1a6640; }
  .feedback.wrong   { background: #fff0f0; color: #b91c1c; }

  .next-btn { width: 100%; margin-top: 14px; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #c2410c, #9a3412); color: #fff; border: none; border-radius: 12px; cursor: pointer; }

  .result-card { background: #fff; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-score { font-size: 42px; font-weight: 800; color: #c2410c; margin-bottom: 4px; }
  .result-sub   { font-size: 13px; color: #888; margin-bottom: 20px; }
  .result-msg   { font-size: 15px; color: #444; padding: 14px; background: #fff8f0; border-radius: 12px; margin-bottom: 20px; }
  .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #c2410c, #9a3412); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="startScreen">
  <div class="header">
    <div class="header-sub">ENGLISH TEST</div>
    <div class="header-title">셀 수 없는 명사 시험 📝</div>
    <div class="header-desc">초등 4~5학년 · 30문제 · 객관식</div>
  </div>
  <div class="content">
    <div class="card">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" oninput="checkReady()">
      <label>반</label>
      <select id="studentClass" onchange="checkReady()">
        <option value="">반을 선택하세요</option>
        <option>A반</option><option>B반</option><option>C반</option><option>D반</option>
      </select>
      <button class="start-btn" id="startBtn" disabled onclick="startTest()">시험 시작하기 →</button>
    </div>
  </div>
</div>

<div id="testScreen" class="hidden">
  <div class="header">
    <div class="header-sub" id="headerName"></div>
    <div class="header-title">셀 수 없는 명사</div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 30</span>
        <span class="progress-score" id="progressScore">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;">
        <div class="question-num" id="questionNum">Q1</div>
        <div class="question-badge" id="questionBadge"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="question-sub" id="questionSub"></div>
    </div>
    <div class="options" id="optionsArea"></div>
    <div class="feedback hidden" id="feedbackArea"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<div id="resultScreen" class="hidden">
  <div class="header">
    <div class="header-sub">RESULT</div>
    <div class="header-title">시험 완료! 🎉</div>
  </div>
  <div class="content">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-sub">30문제 중</div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="retry-btn" onclick="retryTest()">다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const questions = [

  // ── 물질명사 (1~10) ──────────────────────────────────────
  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 물질명사(셀 수 없는 명사)는?", sub:"",
    options:["tomato","lemon","water","tooth"], answer:2 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 물질명사는?", sub:"",
    options:["sheep","corn","Monday","tooth"], answer:1 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 물질명사는?", sub:"",
    options:["lemon","paper","tomato","sheep"], answer:1 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 물질명사가 아닌 것은?", sub:"",
    options:["rice","butter","juice","lemon"], answer:3 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 물질명사가 아닌 것은?", sub:"",
    options:["water","corn","milk","tomato"], answer:3 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"물질명사를 올바르게 표현한 것은?", sub:"주스 한 잔",
    options:["a juice","a glass of juice","juices","one juice"], answer:1 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"물질명사를 올바르게 표현한 것은?", sub:"쌀 한 그릇",
    options:["a rice","rices","a bowl of rice","one rice"], answer:2 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"물질명사를 올바르게 표현한 것은?", sub:"버터 한 조각",
    options:["a butter","butters","a piece of butter","one butter"], answer:2 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"I drink ___ water every day.",
    options:["a","an","many","some"], answer:3 },

  { badge:"물질명사", badgeClass:"badge-material",
    q:"다음 중 올바른 문장은?", sub:"",
    options:["I want a corn.","She drinks a milk.","He eats some rice.","They need a paper."], answer:2 },

  // ── 고유명사 (11~20) ─────────────────────────────────────
  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사는?", sub:"",
    options:["city","music","London","love"], answer:2 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사는?", sub:"",
    options:["water","rice","butter","Mary"], answer:3 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사는?", sub:"",
    options:["corn","Monday","juice","sheep"], answer:1 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사는?", sub:"",
    options:["paper","love","April","music"], answer:2 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사가 아닌 것은?", sub:"",
    options:["London","Mary","English","corn"], answer:3 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"고유명사의 특징으로 알맞은 것은?", sub:"",
    options:["항상 소문자로 쓴다","첫 글자를 대문자로 쓴다","복수형으로 쓸 수 있다","a나 an을 앞에 붙인다"], answer:1 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 올바르게 쓴 고유명사는?", sub:"",
    options:["london","mary","english","April"], answer:3 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"My name is ___.",
    options:["mary","Mary","a Mary","the mary"], answer:1 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 문장에서 고유명사를 고르세요.", sub:"I study English in London.",
    options:["I","study","English","in"], answer:2 },

  { badge:"고유명사", badgeClass:"badge-proper",
    q:"다음 중 고유명사끼리 묶인 것은?", sub:"",
    options:["rice – water – corn","London – Mary – Monday","love – music – hope","tooth – sheep – lemon"], answer:1 },

  // ── 추상명사 (21~27) ─────────────────────────────────────
  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"다음 중 추상명사는?", sub:"",
    options:["water","lemon","love","tomato"], answer:2 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"다음 중 추상명사는?", sub:"",
    options:["corn","music","paper","sheep"], answer:1 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"다음 중 추상명사는?", sub:"",
    options:["butter","London","Mary","hope"], answer:3 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"추상명사의 특징으로 알맞은 것은?", sub:"",
    options:["눈에 보이고 만질 수 있다","셀 수 있어서 복수형이 있다","눈에 보이지 않고 만질 수 없다","항상 대문자로 시작한다"], answer:2 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"다음 중 추상명사가 아닌 것은?", sub:"",
    options:["love","music","freedom","juice"], answer:3 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"빈칸에 알맞은 말을 고르세요.", sub:"___ is very important in life. (사랑)",
    options:["A love","Loves","Love","An love"], answer:2 },

  { badge:"추상명사", badgeClass:"badge-abstract",
    q:"다음 중 추상명사끼리 묶인 것은?", sub:"",
    options:["water – rice – corn","London – Mary – April","love – music – hope","tooth – sheep – tomato"], answer:2 },

  // ── 종합 (28~30) ─────────────────────────────────────────
  { badge:"종합", badgeClass:"badge-mixed",
    q:"단어와 명사 종류가 바르게 연결된 것은?", sub:"",
    options:["water – 고유명사","London – 추상명사","love – 추상명사","Monday – 물질명사"], answer:2 },

  { badge:"종합", badgeClass:"badge-mixed",
    q:"단어와 명사 종류가 바르게 연결된 것은?", sub:"",
    options:["Mary – 물질명사","rice – 추상명사","music – 추상명사","lemon – 고유명사"], answer:2 },

  { badge:"종합", badgeClass:"badge-mixed",
    q:"다음 중 셀 수 없는 명사로만 묶인 것은?", sub:"",
    options:["tomato, lemon, tooth","water, love, London","sheep, corn, Monday","rice, butter, paper"], answer:3 },
];

let currentQ = 0, score = 0, answered = false;

function checkReady() {
  const name = document.getElementById('studentName').value.trim();
  const cls  = document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled = !(name && cls);
}

function startTest() {
  const name = document.getElementById('studentName').value.trim();
  const cls  = document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent = name + ' · ' + cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('questionNum').textContent = 'Q' + (currentQ + 1);
  const badge = document.getElementById('questionBadge');
  badge.textContent = q.badge;
  badge.className   = 'question-badge ' + q.badgeClass;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionSub').textContent  = q.sub;
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / 30';
  document.getElementById('progressScore').textContent = '점수: ' + score;
  document.getElementById('progressFill').style.width  = (currentQ / 30 * 100) + '%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');

  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className   = 'option-btn';
    btn.textContent = ['①','②','③','④'][i] + ' ' + opt;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q    = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedbackArea');
  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    fb.className   = 'feedback correct';
    fb.textContent = '✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className   = 'feedback wrong';
    fb.textContent = '❌ 틀렸어요. 정답은 ' + ['①','②','③','④'][q.answer] + ' ' + q.options[q.answer] + ' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = currentQ < 29 ? '다음 문제 →' : '결과 보기 🎉';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 30) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const name = document.getElementById('studentName').value.trim();
  const pct  = Math.round(score / 30 * 100);
  document.getElementById('resultName').textContent  = name + '의 결과';
  document.getElementById('resultScore').textContent = score + ' / 30';
  let emoji, msg;
  if      (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 셀 수 없는 명사 마스터! 👏'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금만 더 연습하면 완벽해질 거예요!'; }
  else if (pct >= 50) { emoji = '🙂'; msg = '절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.'; }
  else                { emoji = '📚'; msg = '조금 더 열심히 공부해봐요! 다시 도전해보세요!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent   = msg;
}

function retryTest() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ = 0; score = 0;
  showQuestion();
}
</script>
</body>
</html>
