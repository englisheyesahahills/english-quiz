<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>there is/are 의문문·전치사 시험 – 잉글리시아이스쿨관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f0fdf4; color: #1a1a1a; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #0f766e, #0d5f58); color: #fff; padding: 22px 20px 18px; text-align: center; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header-desc { font-size: 12px; opacity: 0.8; }
  .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #99f6e4; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #99f6e4; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=text]:focus, select:focus { border-color: #0f766e; }
  .start-btn { width: 100%; margin-top: 20px; padding: 15px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #0f766e, #0d5f58); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .start-btn:disabled { background: #aaa; cursor: default; }
  .progress-wrap { margin-bottom: 16px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: #888; }
  .progress-score { font-size: 12px; font-weight: 600; color: #0f766e; }
  .progress-bar { height: 6px; background: #99f6e4; border-radius: 99px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #0f766e, #2dd4bf); border-radius: 99px; transition: width 0.4s ease; }
  .question-card { background: #fff; border-radius: 16px; padding: 22px 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-num { font-size: 11px; color: #0f766e; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
  .question-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; margin-left: 6px; }
  .badge-que   { background: #dbeafe; color: #1e40af; }
  .badge-prep  { background: #d1fae5; color: #065f46; }
  .badge-mixed { background: #fef3c7; color: #92400e; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
  .question-sub  { font-size: 15px; color: #333; margin-top: 8px; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option-btn { width: 100%; padding: 13px 16px; font-size: 14px; font-weight: 500; background: #f0fdf4; border: 1.5px solid #99f6e4; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #1a1a1a; }
  .option-btn:hover:not(:disabled) { background: #ccfbf1; border-color: #0f766e; }
  .option-btn.correct { background: #e6f9f0; border-color: #25a56a; color: #1a6640; font-weight: 700; }
  .option-btn.wrong   { background: #fff0f0; border-color: #f87171; color: #b91c1c; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; }
  .feedback.correct { background: #e6f9f0; color: #1a6640; }
  .feedback.wrong   { background: #fff0f0; color: #b91c1c; }
  .next-btn { width: 100%; margin-top: 14px; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #0f766e, #0d5f58); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .result-card { background: #fff; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-score { font-size: 42px; font-weight: 800; color: #0f766e; margin-bottom: 4px; }
  .result-sub   { font-size: 13px; color: #888; margin-bottom: 20px; }
  .result-msg   { font-size: 15px; color: #444; padding: 14px; background: #f0fdf4; border-radius: 12px; margin-bottom: 16px; }
  .save-box { border-radius: 10px; padding: 12px; font-size: 13px; margin: 16px 0; text-align: center; background: #f0fdf4; color: #0f766e; }
  .retry-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #0f766e, #0d5f58); color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="startScreen">
  <div class="header">
    <div class="header-sub">ENGLISH TEST</div>
    <div class="header-title">there is/are 의문문 · 위치 전치사 시험 📝</div>
    <div class="header-desc">초등 4~5학년 · 30문제 · 객관식</div>
  </div>
  <div class="content">
    <div class="card">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="이름을 입력하세요" oninput="checkReady()">
      <label>반</label>
      <select id="studentClass" onchange="checkReady()">
        <option value="">반을 선택하세요</option>
        <option>A반</option><option>B반</option><option>C반</option><option>D반</option>
      </select>
      <button class="start-btn" id="startBtn" disabled onclick="startTest()">시험 시작하기 →</button>
    </div>
  </div>
</div>

<div id="testScreen" class="hidden">
  <div class="header">
    <div class="header-sub" id="headerName"></div>
    <div class="header-title">there is/are 의문문 · 위치 전치사</div>
  </div>
  <div class="content">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="progressLabel">1 / 30</span>
        <span class="progress-score" id="progressScore">점수: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;">
        <div class="question-num" id="questionNum">Q1</div>
        <div class="question-badge" id="questionBadge"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="question-sub" id="questionSub"></div>
    </div>
    <div class="options" id="optionsArea"></div>
    <div class="feedback hidden" id="feedbackArea"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<div id="resultScreen" class="hidden">
  <div class="header">
    <div class="header-sub">RESULT</div>
    <div class="header-title">시험 완료! 🎉</div>
  </div>
  <div class="content">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-sub">30문제 중</div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="save-box" id="save-status">📤 노션에 저장 중...</div>
      <button class="retry-btn" onclick="retryTest()">다시 풀기 🔄</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzNu6BnyzJz8VqB1LKjE89CQha4RSorTG-hxatwM3z_dWsiKivK9k7aVWPILc5h-uP/exec';

async function saveToNotion(name, cls, score, total, unit) {
  try {
    const params = new URLSearchParams();
    params.append('name', name);
    params.append('unit', unit + ' | ' + cls);
    params.append('score', score);
    params.append('total', total);
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
    return true;
  } catch(e) { return false; }
}

const questions = [
  {badge:"의문문",badgeClass:"badge-que",q:"there is/are 의문문의 형태로 알맞은 것은?",sub:"",options:["There is a cat?","Do there is a cat?","Is there a cat?","Are there a cat?"],answer:2},
  {badge:"의문문",badgeClass:"badge-que",q:"빈칸에 알맞은 말을 고르세요.",sub:"___ there a hospital near here?",options:["Are","Do","Is","Does"],answer:2},
  {badge:"의문문",badgeClass:"badge-que",q:"빈칸에 알맞은 말을 고르세요.",sub:"___ there any students in the classroom?",options:["Is","Do","Does","Are"],answer:3},
  {badge:"의문문",badgeClass:"badge-que",q:"다음 문장을 의문문으로 바르게 바꾼 것은?",sub:"There is a bookstore near school.",options:["Do there is a bookstore near school?","There is a bookstore near school?","Is there a bookstore near school?","Are there a bookstore near school?"],answer:2},
  {badge:"의문문",badgeClass:"badge-que",q:"다음 문장을 의문문으로 바르게 바꾼 것은?",sub:"There are three windows in this room.",options:["Is there three windows in this room?","Are there three windows in this room?","Do there are three windows in this room?","There are three windows in this room?"],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"의문문에 대한 알맞은 대답은?",sub:"Is there a dog in the yard?",options:["Yes, there do.","Yes, there is.","Yes, there are.","Yes, it does."],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"의문문에 대한 알맞은 대답은?",sub:"Are there any chairs in the room?",options:["No, there isn't.","No, it isn't.","No, there aren't.","No, they aren't."],answer:2},
  {badge:"의문문",badgeClass:"badge-que",q:"우리말 뜻에 맞는 의문문은?",sub:"근처에 편의점이 있니?",options:["Are there a convenience store nearby?","Is there a convenience store nearby?","Do there is a convenience store nearby?","There is a convenience store nearby?"],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"우리말 뜻에 맞는 의문문은?",sub:"냉장고 안에 달걀이 있니?",options:["Are there eggs in the fridge?","Is there eggs in the fridge?","Do there eggs in the fridge?","Does there eggs in the fridge?"],answer:0},
  {badge:"의문문",badgeClass:"badge-que",q:"빈칸에 알맞은 말을 고르세요.",sub:"___ there a swimming pool in your school?",options:["Are","Do","Does","Is"],answer:3},
  {badge:"의문문",badgeClass:"badge-que",q:"다음 중 올바른 의문문은?",sub:"",options:["Is there any books on the shelf?","Are there any books on the shelf?","Do there any books on the shelf?","There are books on the shelf?"],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"대화의 빈칸에 알맞은 말은?",sub:"A: Is there a bank near here?  B: Yes, ___ ___.",options:["there are","there is","it is","they are"],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"대화의 빈칸에 알맞은 말은?",sub:"A: Are there many people at the party?  B: No, ___ ___.",options:["there isn't","there aren't","it isn't","they aren't"],answer:1},
  {badge:"의문문",badgeClass:"badge-que",q:"다음 중 올바른 의문문은?",sub:"",options:["Is there a pen in your bag?","Are there a pen in your bag?","Do there a pen in your bag?","Does there a pen in your bag?"],answer:0},
  {badge:"의문문",badgeClass:"badge-que",q:"우리말 뜻에 맞는 의문문은?",sub:"그 도시에 공항이 있니?",options:["Are there an airport in the city?","Do there an airport in the city?","Is there an airport in the city?","Does there an airport in the city?"],answer:2},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"'on'의 뜻으로 알맞은 것은?",sub:"",options:["~ 안에","~ 위에 (접촉)","~ 아래에","~ 옆에"],answer:1},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"'under'의 뜻으로 알맞은 것은?",sub:"",options:["~ 안에","~ 위에","~ 아래에","~ 앞에"],answer:2},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"빈칸에 알맞은 전치사를 고르세요.",sub:"There is a cat ___ the sofa. (소파 위에)",options:["in","under","on","behind"],answer:2},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"빈칸에 알맞은 전치사를 고르세요.",sub:"There is a ball ___ the table. (테이블 아래에)",options:["on","in","next to","under"],answer:3},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"빈칸에 알맞은 전치사를 고르세요.",sub:"There are books ___ the bag. (가방 안에)",options:["on","in","under","behind"],answer:1},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"빈칸에 알맞은 전치사를 고르세요.",sub:"There is a bus stop ___ the school. (학교 앞에)",options:["behind","next to","in front of","under"],answer:2},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"빈칸에 알맞은 전치사를 고르세요.",sub:"There is a park ___ my house. (우리 집 옆에)",options:["in","on","behind","next to"],answer:3},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"다음 문장의 뜻으로 알맞은 것은?",sub:"There is a dog behind the door.",options:["문 앞에 개가 있다.","문 옆에 개가 있다.","문 위에 개가 있다.","문 뒤에 개가 있다."],answer:3},
  {badge:"위치 전치사",badgeClass:"badge-prep",q:"우리말 뜻에 맞는 영어 문장은?",sub:"침대 아래에 상자가 있다.",options:["There is a box on the bed.","There is a box in the bed.","There is a box under the bed.","There is a box next to the bed."],answer:2},
  {badge:"종합",badgeClass:"badge-mixed",q:"빈칸에 알맞은 말을 모두 고르세요.",sub:"___ there a library ___ your school?",options:["Is / near","Are / near","Is / on","Are / in"],answer:0},
  {badge:"종합",badgeClass:"badge-mixed",q:"우리말 뜻에 맞는 영어 문장은?",sub:"책상 위에 연필이 있니?",options:["Are there a pencil on the desk?","Is there a pencil on the desk?","Is there a pencil in the desk?","Are there a pencil under the desk?"],answer:1},
  {badge:"종합",badgeClass:"badge-mixed",q:"다음 중 올바른 문장은?",sub:"",options:["There is a cat in on the box.","There are flowers next to the window.","Is there books under the chair?","There is a bird on in the tree."],answer:1},
  {badge:"종합",badgeClass:"badge-mixed",q:"대화의 빈칸에 알맞은 말은?",sub:"A: ___ there a post office near here?  B: No, there ___.",options:["Is / isn't","Are / aren't","Is / aren't","Are / isn't"],answer:0},
  {badge:"종합",badgeClass:"badge-mixed",q:"우리말 뜻에 맞는 영어 문장은?",sub:"소파 옆에 강아지 두 마리가 있니?",options:["Is there two dogs next to the sofa?","Are there two dogs next to the sofa?","Is there two dogs on the sofa?","Are there two dogs under the sofa?"],answer:1},
  {badge:"종합",badgeClass:"badge-mixed",q:"다음 중 올바른 문장은?",sub:"",options:["There is a lamp on the desk.","There are a book in the shelf.","Is there any pencil in your bag?","Are there a dog behind the house?"],answer:0},
];

let currentQ=0, score=0, answered=false;
let _name='', _cls='';

function checkReady(){
  const name=document.getElementById('studentName').value.trim();
  const cls=document.getElementById('studentClass').value;
  document.getElementById('startBtn').disabled=!(name&&cls);
}

function startTest(){
  _name=document.getElementById('studentName').value.trim();
  _cls=document.getElementById('studentClass').value;
  document.getElementById('headerName').textContent=_name+' · '+_cls;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ=0; score=0;
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=questions[currentQ];
  document.getElementById('questionNum').textContent='Q'+(currentQ+1);
  const badge=document.getElementById('questionBadge');
  badge.textContent=q.badge; badge.className='question-badge '+q.badgeClass;
  document.getElementById('questionText').textContent=q.q;
  document.getElementById('questionSub').textContent=q.sub;
  document.getElementById('progressLabel').textContent=(currentQ+1)+' / 30';
  document.getElementById('progressScore').textContent='점수: '+score;
  document.getElementById('progressFill').style.width=(currentQ/30*100)+'%';
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  const area=document.getElementById('optionsArea');
  area.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=['①','②','③','④'][i]+' '+opt;
    btn.onclick=()=>selectAnswer(i);
    area.appendChild(btn);
  });
}

function selectAnswer(idx){
  if(answered)return; answered=true;
  const q=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedbackArea');
  if(idx===q.answer){
    score++; btns[idx].classList.add('correct');
    fb.className='feedback correct'; fb.textContent='✅ 정답이에요! 잘했어요!';
  } else {
    btns[idx].classList.add('wrong'); btns[q.answer].classList.add('correct');
    fb.className='feedback wrong';
    fb.textContent='❌ 틀렸어요. 정답은 '+['①','②','③','④'][q.answer]+' '+q.options[q.answer]+' 이에요.';
  }
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent=currentQ<29?'다음 문제 →':'결과 보기 🎉';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=30)showResult();
  else showQuestion();
}

async function showResult(){
  document.getElementById('testScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const pct=Math.round(score/30*100);
  document.getElementById('resultName').textContent=_name+'의 결과';
  document.getElementById('resultScore').textContent=score+' / 30';
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='완벽해요! there is/are + 전치사 마스터! 👏';}
  else if(pct>=70){emoji='😊';msg='잘했어요! 조금만 더 연습하면 완벽해질 거예요!';}
  else if(pct>=50){emoji='🙂';msg='절반 이상 맞혔어요! 틀린 문제를 다시 복습해봐요.';}
  else{emoji='📚';msg='조금 더 열심히 공부해봐요! 다시 도전해보세요!';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultMsg').textContent=msg;

  const saveEl=document.getElementById('save-status');
  await saveToNotion(_name, _cls, score, 30, 'there is/are 의문문·위치 전치사 시험');
  saveEl.style.background='#dcfce7';
  saveEl.style.color='#15803d';
  saveEl.textContent='✅ 결과가 노션에 자동 저장됐어요!';
}

function retryTest(){
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('testScreen').classList.remove('hidden');
  currentQ=0; score=0;
  showQuestion();
}
</script>
</body>
</html>
