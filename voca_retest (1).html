<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어 재시 - 잉글리시아이 스텔라영어학원</title>
<style>
  :root{
    --navy:#12233f; --navy-deep:#0a1626; --gold:#c99a4b;
    --paper:#f6f4ee; --ink:#1c2431;
    --danger:#b5493d; --danger-bg:#fbeae7;
    --ok:#3f7a5c; --ok-bg:#e9f2ec;
    --line:#dcd6c8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',-apple-system,sans-serif;line-height:1.5;}
  header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);color:#f2ede1;padding:22px 20px;}
  header .inner{max-width:640px;margin:0 auto;}
  header h1{font-size:20px;margin:0 0 4px;font-weight:800;}
  header p{font-size:12.5px;color:#c9c2ac;margin:0;}
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;}
  label{display:block;font-size:12.5px;color:#6b6656;font-weight:700;margin-bottom:5px;margin-top:12px;}
  label:first-child{margin-top:0;}
  select,input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:14.5px;font-family:inherit;background:#fff;}
  select:focus,input:focus{outline:none;border-color:var(--navy);}
  .btn{width:100%;margin-top:16px;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:active{opacity:0.85;}
  .btn:disabled{background:#b8b3a4;cursor:not-allowed;}
  .status-box{border-radius:8px;padding:14px 16px;font-size:13.5px;margin-top:14px;display:none;}
  .status-box.show{display:block;}
  .status-box.info{background:#eef1f5;color:#38506b;}
  .status-box.block{background:var(--danger-bg);color:var(--danger);font-weight:700;}
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12.5px;color:#8f8973;}
  .qword{font-size:26px;font-weight:800;color:var(--navy);text-align:center;margin:18px 0 6px;}
  .qmeaning{font-size:14px;color:#6b6656;text-align:center;margin-bottom:20px;}
  .choices{display:grid;gap:10px;}
  .choice{border:1.5px solid var(--line);border-radius:8px;padding:12px 14px;font-size:14.5px;cursor:pointer;background:#fff;text-align:left;}
  .choice:active{background:#f0ede3;}
  .choice.correct{border-color:var(--ok);background:var(--ok-bg);}
  .choice.wrong{border-color:var(--danger);background:var(--danger-bg);}
  .write-input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:8px;font-size:16px;text-align:center;font-family:inherit;}
  .progress{height:6px;background:#eee8d8;border-radius:4px;overflow:hidden;margin-bottom:18px;}
  .progress i{display:block;height:100%;background:var(--gold);}
  .result-score{font-size:44px;font-weight:900;text-align:center;margin:10px 0 4px;}
  .result-score.pass{color:var(--ok);}
  .result-score.fail{color:var(--danger);}
  .result-label{text-align:center;font-size:14px;color:#6b6656;margin-bottom:18px;}
  .result-tag{display:block;text-align:center;font-size:15px;font-weight:800;padding:10px;border-radius:8px;margin-bottom:14px;}
  .result-tag.pass{background:var(--ok-bg);color:var(--ok);}
  .result-tag.fail{background:var(--danger-bg);color:var(--danger);}
  .hidden{display:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13.5px;opacity:0;transition:all .3s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header><div class="inner">
  <h1>단어 재시</h1>
  <p>스텔라영어학원 · 50% 미만 학생 재시험 · 최대 3회</p>
</div></header>

<div class="wrap">

  <div class="card" id="setupCard">
    <label>이름</label>
    <input type="text" id="studentName" placeholder="이름을 입력하세요">
    <label>반</label>
    <select id="studentClass">
      <option value="">반 선택</option>
      <option>A반</option><option>B반</option><option>C반</option><option>D반</option><option>E반</option>
    </select>
    <label>교재</label>
    <select id="bookSelect" onchange="onBookChange()">
      <option value="">교재를 선택하세요</option>
      <option value="book1">능률보카초등 기본</option>
      <option value="book2">보카클리어기본 (중등)</option>
      <option value="book3">보카클리어실력 (중등)</option>
    </select>
    <label>DAY (선생님이 알려주신 재시 단원)</label>
    <select id="daySelect" disabled><option value="">교재를 먼저 선택하세요</option></select>
    <button class="btn" id="checkBtn" onclick="checkEligibility()">재시 확인</button>
    <div class="status-box" id="statusBox"></div>
  </div>

  <div class="card hidden" id="quizCard">
    <div class="qhead">
      <span id="quizMeta"></span>
      <span id="quizProgress"></span>
    </div>
    <div class="progress"><i id="progressBar" style="width:0%"></i></div>
    <div id="quizBody"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="result-tag" id="resultTag"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-label" id="resultLabel"></div>
    <button class="btn" onclick="location.reload()">처음으로</button>
  </div>

</div>

<div class="toast" id="toast"></div>

const BANKS = { book1: BANK1, book2: BANK2, book3: BANK3 };

let currentUnit = '', currentWords = [], quizItems = [], quizIdx = 0, quizScore = 0, attemptNo = 1, currentPageId = '';

function onBookChange() {
  const book = document.getElementById('bookSelect').value;
  const daySel = document.getElementById('daySelect');
  daySel.innerHTML = '';
  if (!book) { daySel.disabled = true; daySel.innerHTML = '<option value="">교재를 먼저 선택하세요</option>'; return; }
  const bank = BANKS[book];
  const days = Object.keys(bank).map(Number).sort((a,b)=>a-b);
  daySel.innerHTML = '<option value="">DAY 선택</option>' + days.map(d => `<option value="${d}">DAY ${String(d).padStart(2,'0')}</option>`).join('');
  daySel.disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

async function checkEligibility() {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  const book = document.getElementById('bookSelect').value;
  const day = document.getElementById('daySelect').value;
  const box = document.getElementById('statusBox');

  if (!name) { showToast('이름을 입력해 주세요'); return; }
  if (!book || !day) { showToast('교재와 DAY를 선택해 주세요'); return; }

  currentUnit = `${BOOK_LABELS[book]} DAY${String(day).padStart(2,'0')}`;
  const words = BANKS[book][day];
  if (!words || words.length === 0) { showToast('해당 DAY의 단어 데이터가 없습니다'); return; }

  box.className = 'status-box show info';
  box.textContent = '재시 기록을 확인하는 중...';

  try {
    const res = await fetch(`${RETEST_URL}?action=checkAttempts&name=${encodeURIComponent(name)}&unit=${encodeURIComponent(currentUnit)}`);
    const data = await res.json();

    if (!data.eligible) {
      box.className = 'status-box show block';
      if (data.reason === 'not_registered') {
        box.textContent = `${currentUnit}에 대한 재시 대상자로 등록되어 있지 않습니다. 선생님께 확인해 주세요.`;
      } else if (data.reason === 'already_passed') {
        box.textContent = `${currentUnit}은 이미 합격 처리되었습니다. 재시가 필요 없습니다.`;
      } else if (data.reason === 'max_attempts') {
        box.textContent = `이미 ${currentUnit} 재시를 3회 모두 응시했습니다. 선생님과 상담해 주세요.`;
      } else {
        box.textContent = '재시 대상 확인에 실패했습니다.';
      }
      return;
    }

    attemptNo = (data.attemptsUsed || 0) + 1;
    currentPageId = data.pageId || '';
    box.className = 'status-box show info';
    box.textContent = `${currentUnit} · ${attemptNo}차 재시를 시작합니다. (통과 기준 50%)`;
    startQuiz(words);
  } catch (e) {
    // 백엔드 연결 전 임시 동작: 확인 없이 바로 시작 (배포 후 자동으로 정상 동작)
    attemptNo = 1;
    box.className = 'status-box show info';
    box.textContent = `${currentUnit} · 재시를 시작합니다. (재시 대상 확인은 Apps Script 배포 후 활성화됩니다)`;
    startQuiz(words);
  }
}

function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }

function startQuiz(words) {
  const pool = shuffle(words);
  const n = Math.min(10, pool.length);
  const chosen = pool.slice(0, n);
  quizItems = chosen.map((w, i) => {
    const isWritten = i % 2 === 1; // 절반은 객관식, 절반은 주관식
    if (isWritten) return { type:'write', en:w.en, kr:w.kr };
    const wrongPool = words.filter(x => x.en !== w.en);
    const wrongs = shuffle(wrongPool).slice(0,3).map(x=>x.kr);
    const opts = shuffle([w.kr, ...wrongs]);
    return { type:'mcq', en:w.en, kr:w.kr, opts };
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('setupCard').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const total = quizItems.length;
  document.getElementById('quizMeta').textContent = currentUnit + ` · ${attemptNo}차`;
  document.getElementById('quizProgress').textContent = `${quizIdx+1} / ${total}`;
  document.getElementById('progressBar').style.width = `${(quizIdx/total)*100}%`;
  const q = quizItems[quizIdx];
  const body = document.getElementById('quizBody');
  if (q.type === 'mcq') {
    body.innerHTML = `
      <div class="qword">${q.en}</div>
      <div class="qmeaning">알맞은 뜻을 고르세요</div>
      <div class="choices">${q.opts.map(o => `<div class="choice" onclick="answerMcq(this,'${o.replace(/'/g,"\'")}')">${o}</div>`).join('')}</div>
    `;
  } else {
    body.innerHTML = `
      <div class="qmeaning" style="font-size:18px;margin-bottom:6px;">${q.kr}</div>
      <div class="qmeaning">뜻에 맞는 영단어를 쓰세요</div>
      <input type="text" class="write-input" id="writeInput" placeholder="영단어 입력" autocomplete="off">
      <button class="btn" onclick="answerWrite()">제출</button>
    `;
    setTimeout(()=>document.getElementById('writeInput').focus(), 100);
  }
}

function answerMcq(el, chosen) {
  const q = quizItems[quizIdx];
  const correct = q.kr;
  document.querySelectorAll('.choice').forEach(c => {
    c.onclick = null;
    if (c.textContent === correct) c.classList.add('correct');
    else if (c.textContent === chosen && chosen !== correct) c.classList.add('wrong');
  });
  if (chosen === correct) quizScore++;
  setTimeout(nextQuestion, 700);
}

function answerWrite() {
  const input = document.getElementById('writeInput');
  const val = input.value.trim().toLowerCase();
  const q = quizItems[quizIdx];
  if (val === q.en.toLowerCase()) quizScore++;
  nextQuestion();
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx >= quizItems.length) { finishQuiz(); return; }
  renderQuestion();
}

async function finishQuiz() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('resultCard').classList.remove('hidden');
  const total = quizItems.length;
  const pct = Math.round(quizScore/total*100);
  const passed = pct >= 50;
  document.getElementById('progressBar').style.width = '100%';

  const tag = document.getElementById('resultTag');
  tag.className = 'result-tag ' + (passed ? 'pass' : 'fail');
  tag.textContent = passed ? '✅ 통과' : (attemptNo >= 3 ? '❌ 3차 재시 미통과' : '❌ 미통과 — 다음 재시 필요');

  const scoreEl = document.getElementById('resultScore');
  scoreEl.className = 'result-score ' + (passed ? 'pass' : 'fail');
  scoreEl.textContent = `${quizScore} / ${total}`;

  document.getElementById('resultLabel').textContent =
    `${currentUnit} · ${attemptNo}차 재시 · 정답률 ${pct}%` +
    (passed ? '' : (attemptNo >= 3 ? ' · 선생님과 상담이 필요합니다' : ` · 남은 재시 ${3-attemptNo}회`));

  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;

  try {
    const params = new URLSearchParams({
      action: 'saveRetest', name, class: cls || '미입력',
      unit: currentUnit, correct: quizScore, total, attemptNo, passed: passed ? 'Y' : 'N',
      pageId: currentPageId
    });
    const saveRes = await fetch(`${RETEST_URL}?${params.toString()}`);
    const saveData = await saveRes.json();
    if (!saveData.ok) {
      showToast('저장 중 문제가 발생했습니다: ' + (saveData.error || '알 수 없는 오류'));
    }
  } catch(e) {
    showToast('저장 실패 — 인터넷 연결을 확인해 주세요');
  }
}
