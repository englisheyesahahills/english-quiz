<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보카클리어 중학 실력편 🌟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Poppins:wght@400;600;800&display=swap');

  :root {
    --bg: #0f0e1a;
    --surface: #1a1830;
    --card: #221f38;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --accent3: #6af7c8;
    --text: #f0eeff;
    --muted: #8885a8;
    --border: #332f55;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .progress-bar-wrap {
    flex: 1;
    max-width: 300px;
    margin: 0 20px;
    background: var(--border);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 20px;
    transition: width 0.4s ease;
  }
  .score-badge {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent3);
  }

  /* ── STUDENT BAR (이름/반/저장) ── */
  .student-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .student-bar label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .student-bar input, .student-bar select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }
  .student-bar input { width: 100px; }
  .student-bar input:focus, .student-bar select:focus { border-color: var(--accent); }
  .student-save-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .student-save-btn:hover { background: #6a58e0; }
  .student-save-status { font-size: 12px; font-weight: 600; color: var(--accent3); }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* ── DAY SELECTOR ── */
  .day-selector {
    margin-bottom: 24px;
  }
  .day-selector h2 {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .day-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .day-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Poppins', sans-serif;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .day-btn.completed::after {
    content: ' ✓';
    color: var(--accent3);
  }

  /* ── MODE TABS ── */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    border-radius: 14px;
    padding: 6px;
    border: 1px solid var(--border);
  }
  .mode-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .mode-tab .icon { font-size: 18px; }
  .mode-tab:hover { color: var(--text); background: var(--card); }
  .mode-tab.active {
    background: var(--accent);
    color: white;
  }

  /* ── STUDY CARD ── */
  .study-area { display: none; }
  .study-area.active { display: block; }

  .word-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .word-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
  }
  .word-card .day-tag {
    display: inline-block;
    background: rgba(124,106,247,0.2);
    border: 1px solid rgba(124,106,247,0.4);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 16px;
    font-family: 'Poppins', sans-serif;
  }
  .word-card .english {
    font-family: 'Poppins', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.1;
  }
  .word-card .korean {
    font-size: 20px;
    color: var(--accent3);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .word-card .pos-tag {
    display: inline-block;
    background: rgba(106,247,200,0.1);
    border: 1px solid rgba(106,247,200,0.3);
    color: var(--accent3);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
  }

  /* ── FLIP CARD ── */
  .flip-wrap {
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .flip-inner {
    position: relative;
    width: 100%;
    min-height: 220px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute;
    width: 100%;
    min-height: 220px;
    backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .flip-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1e1b40, #2a2250);
    border-color: var(--accent);
  }
  .flip-hint {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── SPEAK BUTTON ── */
  .speak-btn {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.4);
    color: var(--accent);
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
  }
  .speak-btn:hover {
    background: rgba(124,106,247,0.3);
    transform: scale(1.03);
  }
  .speak-btn.speaking {
    background: var(--accent);
    color: white;
    animation: pulse 0.8s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 14px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
  }
  .nav-btn:hover { border-color: var(--accent); }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .nav-btn.primary:hover { background: #6a58e0; }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── QUIZ (MULTIPLE CHOICE) ── */
  .quiz-question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .quiz-question .q-word {
    font-family: 'Poppins', sans-serif;
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .quiz-question .q-label {
    font-size: 13px;
    color: var(--muted);
  }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .choice-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 14px;
    padding: 14px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: left;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,106,247,0.1); }
  .choice-btn.correct { background: rgba(74,222,128,0.15); border-color: var(--success); color: var(--success); }
  .choice-btn.wrong { background: rgba(248,113,113,0.15); border-color: var(--error); color: var(--error); }
  .choice-btn:disabled { cursor: default; }

  /* ── SHORT ANSWER ── */
  .sa-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .sa-container .q-meaning {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 8px;
  }
  .sa-container .q-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .sa-input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 18px;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    transition: border-color 0.2s;
    outline: none;
  }
  .sa-input:focus { border-color: var(--accent); }
  .sa-input.correct { border-color: var(--success); background: rgba(74,222,128,0.07); }
  .sa-input.wrong { border-color: var(--error); background: rgba(248,113,113,0.07); }
  .sa-feedback {
    margin-top: 12px;
    font-size: 15px;
    font-weight: 600;
    min-height: 24px;
  }

  /* ── SHADOWING ── */
  .shadow-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .shadow-word {
    font-family: 'Poppins', sans-serif;
    font-size: 36px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 4px;
  }
  .shadow-ipa {
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 8px;
    font-family: 'Poppins', sans-serif;
  }
  .shadow-meaning {
    text-align: center;
    font-size: 18px;
    color: var(--accent3);
    font-weight: 600;
    margin-bottom: 20px;
  }
  .shadow-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .shadow-btn {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.4);
    color: var(--accent);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    transition: all 0.2s;
  }
  .shadow-btn:hover { background: rgba(124,106,247,0.3); }
  .shadow-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
    animation: pulse 1s ease infinite;
  }
  .waveform {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin: 16px 0;
  }
  .wave-bar {
    width: 4px;
    background: var(--accent);
    border-radius: 4px;
    height: 8px;
    transition: height 0.1s ease;
  }
  .wave-bar.active { animation: wave 0.6s ease infinite; }
  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 40px; }
  }
  .wave-bar:nth-child(2n) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3n) { animation-delay: 0.2s; }

  /* ── WORD LIST ── */
  .word-list-table {
    width: 100%;
    border-collapse: collapse;
  }
  .word-list-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .word-list-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(51,47,85,0.5);
    font-size: 14px;
    vertical-align: middle;
  }
  .word-list-table tr:hover td { background: rgba(124,106,247,0.05); }
  .word-en { font-family: 'Poppins', sans-serif; font-weight: 600; color: var(--text); }
  .word-ko { color: var(--accent3); }
  .mini-speak {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mini-speak:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESULT PANEL ── */
  .result-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-emoji { font-size: 48px; margin-bottom: 12px; }
  .result-score { font-size: 48px; font-family: 'Poppins', sans-serif; font-weight: 800; color: var(--accent3); }
  .result-label { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  /* ── WORD COUNTER ── */
  .word-counter {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .counter-num {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent3);
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) {
    .word-card .english { font-size: 28px; }
    .choices { grid-template-columns: 1fr; }
    .mode-tab { font-size: 10px; }
    .mode-tab .icon { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">VOCA CLEAR</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="score-badge" id="scoreBadge">⭐ 0점</div>
</div>

<div class="student-bar">
  <label>이름</label>
  <input type="text" id="studentName" placeholder="홍길동" maxlength="10">
  <label>반</label>
  <select id="studentClass">
    <option value="">선택</option>
    <option>A반</option><option>B반</option><option>C반</option>
    <option>D반</option><option>E반</option><option>F반</option>
  </select>
  <button class="student-save-btn" onclick="manualSave()">💾 점수 저장</button>
  <span class="student-save-status" id="saveStatus"></span>
</div>

<div class="main">

  <!-- DAY SELECTOR -->
  <div class="day-selector">
    <h2>📚 학습 DAY 선택</h2>
    <div class="day-grid" id="dayGrid"></div>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flash')" data-mode="flash">
      <span class="icon">🃏</span>플래시카드
    </button>
    <button class="mode-tab" onclick="setMode('mc')" data-mode="mc">
      <span class="icon">🎯</span>객관식
    </button>
    <button class="mode-tab" onclick="setMode('sa')" data-mode="sa">
      <span class="icon">✏️</span>주관식
    </button>
    <button class="mode-tab" onclick="setMode('shadow')" data-mode="shadow">
      <span class="icon">🎤</span>쉐도잉
    </button>
    <button class="mode-tab" onclick="setMode('list')" data-mode="list">
      <span class="icon">📋</span>단어목록
    </button>
  </div>

  <!-- FLASH CARD MODE -->
  <div class="study-area active" id="mode-flash">
    <div class="word-counter">
      <span id="flashCounter">0 / 0</span>
      <span style="color:var(--accent2); font-weight:700" id="flashStreak">🔥 0연속</span>
    </div>
    <div class="flip-wrap" id="flipWrap" onclick="flipCard()">
      <div class="flip-inner" id="flipInner">
        <div class="flip-front">
          <span class="day-tag" id="flashDayTag">DAY 01</span>
          <div class="english" id="flashWord">단어</div>
          <div style="margin-top:16px">
            <button class="speak-btn" id="flashSpeakBtn" onclick="event.stopPropagation(); speakWord()">🔊 발음 듣기</button>
          </div>
          <span class="flip-hint">탭하여 뜻 확인</span>
        </div>
        <div class="flip-back">
          <span class="day-tag" id="flashDayTag2">DAY 01</span>
          <div class="korean" id="flashMeaning">뜻</div>
          <div class="pos-tag" id="flashPos">품사</div>
          <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center">
            <button class="speak-btn" onclick="event.stopPropagation(); speakWord()">🔊 발음</button>
            <button class="speak-btn" style="background:rgba(106,247,200,0.1); border-color:rgba(106,247,200,0.3); color:var(--accent3)" onclick="event.stopPropagation(); speakKorean()">🔊 뜻 읽기</button>
          </div>
          <span class="flip-hint">탭하여 영어로</span>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevWord()">← 이전</button>
      <button class="nav-btn primary" onclick="nextWord()">다음 →</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="markKnown()" style="color:var(--success); border-color:var(--success)">✓ 알았어요</button>
      <button class="nav-btn" onclick="markUnknown()" style="color:var(--error); border-color:var(--error)">✗ 모르겠어요</button>
    </div>
  </div>

  <!-- MULTIPLE CHOICE MODE -->
  <div class="study-area" id="mode-mc">
    <div class="word-counter">
      <span><span class="counter-num" id="mcCurrent">1</span> / <span id="mcTotal">25</span></span>
      <span style="color:var(--success)" id="mcScore">맞은 문제: 0</span>
    </div>
    <div class="quiz-question">
      <div class="q-label">다음 영어 단어의 뜻은?</div>
      <div class="q-word" id="mcWord">word</div>
    </div>
    <div class="choices" id="mcChoices"></div>
    <button class="nav-btn primary" id="mcNextBtn" onclick="mcNext()" style="width:100%; display:none">다음 문제 →</button>

{d:"DAY 40",e:"through",k:"~을 통해, ~을 통과하여",p:"기타"},
{d:"DAY 40",e:"among",k:"~ 중에, ~ 사이에",p:"기타"},
{d:"DAY 40",e:"beyond",k:"~ 너머에, ~을 지나서, 넘어서",p:"기타"},
{d:"DAY 40",e:"mark",k:"표시하다; 자국, 표시",p:"동사"},
{d:"DAY 40",e:"closely",k:"가까이, 자세히, 면밀히",p:"부사"},
{d:"DAY 40",e:"ahead of",k:"~의 앞에",p:"숙어/표현"},
{d:"DAY 40",e:"on the other side of",k:"~의 반대쪽[맞은편]에",p:"숙어/표현"},
{d:"DAY 40",e:"side by side",k:"나란히",p:"숙어/표현"},
];

// ── STATE ──
let currentDay = 'DAY 01';
let currentMode = 'flash';
let currentIdx = 0;
let isFlipped = false;
let score = 0;
let streak = 0;
let mcCorrect = 0;
let mcIdx = 0;
let saCorrect = 0;
let saIdx = 0;
let shadowIdx = 0;
let currentWords = [];
let mcAnswered = false;
let saAnswered = false;
const completedDays = new Set(JSON.parse(localStorage.getItem('completedDays') || '[]'));
const knownWords = new Set(JSON.parse(localStorage.getItem('knownWords') || '[]'));

// ══════════════════════════════════════════
// NOTION SAVE (Google Apps Script 방식 — 단어학습시스템 DB와 동일)
// ══════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzJLPd5mts_LdZBMPhPH42lNVrJX_CQXqebR05hGw2R591nYjHPn0BqElTi01sRieI/exec";

function sendScoreToSheet(unitLabel, scoreValue) {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  if (!name) return; // 이름 없으면 조용히 스킵 (자동 호출 시 방해 안 되게)

  const now = new Date();
  const dt = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const p = new URLSearchParams({
    name: name,
    class: cls || '미입력',
    unit: '보카클리어 ' + currentDay + ' ' + unitLabel,
    score: scoreValue,
    datetime: dt
  });

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: p.toString()
  }).then(() => {
    const status = document.getElementById('saveStatus');
    if (status) { status.textContent = '✅ 저장 완료!'; setTimeout(() => status.textContent = '', 3000); }
  }).catch(() => {
    const status = document.getElementById('saveStatus');
    if (status) status.textContent = '❌ 저장 실패';
  });
}

function manualSave() {
  const name = document.getElementById('studentName').value.trim();
  if (!name) { showToast('이름을 입력해 주세요!'); return; }
  document.getElementById('saveStatus').textContent = '저장 중...';
  let label = '플래시카드', val = score;
  if (currentMode === 'mc') { label = '객관식'; val = mcCorrect; }
  else if (currentMode === 'sa') { label = '주관식'; val = saCorrect; }
  else if (currentMode === 'shadow') { label = '쉐도잉'; val = score; }
  sendScoreToSheet(label, val);
}

// ── INIT ──
function init() {
  buildDayGrid();
  loadDay('DAY 01');
}

function buildDayGrid() {
  const grid = document.getElementById('dayGrid');
  const days = [...new Set(WORDS.map(w => w.d))];
  grid.innerHTML = '';
  // Add "ALL" button
  const allBtn = document.createElement('button');
  allBtn.className = 'day-btn';
  allBtn.textContent = '전체';
  allBtn.onclick = () => loadDay('ALL');
  grid.appendChild(allBtn);
  days.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === currentDay ? ' active' : '') + (completedDays.has(d) ? ' completed' : '');
    btn.textContent = d.replace('DAY ', 'D');
    btn.onclick = () => loadDay(d);
    btn.id = 'daybtn-' + d.replace(' ', '');
    grid.appendChild(btn);
  });
}

function loadDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('daybtn-' + day.replace(' ', ''));
  if (btn) btn.classList.add('active');
  if (day === 'ALL') {
    currentWords = [...WORDS];
    document.querySelectorAll('.day-btn')[0].classList.add('active');
  } else {
    currentWords = WORDS.filter(w => w.d === day);
  }
  shuffle(currentWords);
  currentIdx = 0;
  mcIdx = 0; mcCorrect = 0;
  saIdx = 0; saCorrect = 0;
  shadowIdx = 0;
  streak = 0;
  isFlipped = false;
  refreshMode();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── MODE SWITCHING ──
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  document.querySelectorAll('.study-area').forEach(a => a.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  currentIdx = 0; mcIdx = 0; saIdx = 0; shadowIdx = 0;
  isFlipped = false;
  refreshMode();
}

function refreshMode() {
  if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'mc') renderMC();
  else if (currentMode === 'sa') renderSA();
  else if (currentMode === 'shadow') renderShadow();
  else if (currentMode === 'list') renderList();
  updateProgress();
}

// ── FLASH CARD ──
function renderFlash() {
  if (!currentWords.length) return;
  const w = currentWords[currentIdx];
  document.getElementById('flashWord').textContent = w.e;
  document.getElementById('flashMeaning').textContent = w.k;
  document.getElementById('flashPos').textContent = w.p;
  document.getElementById('flashDayTag').textContent = w.d;
  document.getElementById('flashDayTag2').textContent = w.d;
  document.getElementById('flashCounter').textContent = `${currentIdx + 1} / ${currentWords.length}`;
  document.getElementById('flashStreak').textContent = `🔥 ${streak}연속`;
  const fi = document.getElementById('flipInner');
  fi.classList.remove('flipped');
  isFlipped = false;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flipInner').classList.toggle('flipped', isFlipped);
}

function nextWord() {
  if (currentIdx < currentWords.length - 1) {
    currentIdx++;
    renderFlash();
  } else {
    showToast('🎉 DAY 완료! 수고했어요!');
    markDayComplete();
  }
}

function prevWord() {
  if (currentIdx > 0) { currentIdx--; renderFlash(); }
}

function markKnown() {
  knownWords.add(currentWords[currentIdx].e);
  localStorage.setItem('knownWords', JSON.stringify([...knownWords]));
  streak++;
  score += 10;
  updateScore();
  nextWord();
}

function markUnknown() {
  knownWords.delete(currentWords[currentIdx].e);
  streak = 0;
  nextWord();
}

function markDayComplete() {
  if (currentDay !== 'ALL') {
    completedDays.add(currentDay);
    localStorage.setItem('completedDays', JSON.stringify([...completedDays]));
    buildDayGrid();
    loadDay(currentDay);
  }
}

// ── MULTIPLE CHOICE ──
function renderMC() {
  if (!currentWords.length) return;
  mcAnswered = false;
  const w = currentWords[mcIdx % currentWords.length];
  document.getElementById('mcWord').textContent = w.e;
  document.getElementById('mcCurrent').textContent = mcIdx + 1;
  document.getElementById('mcTotal').textContent = currentWords.length;
  document.getElementById('mcScore').textContent = `맞은 문제: ${mcCorrect}`;
  document.getElementById('mcNextBtn').style.display = 'none';

  // Build choices: 1 correct + 3 random wrong
  const wrongPool = WORDS.filter(x => x.e !== w.e && x.k !== w.k);
  shuffle(wrongPool);
  const choices = [w, ...wrongPool.slice(0, 3)];
  shuffle(choices);

  const container = document.getElementById('mcChoices');
  container.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.k;
    btn.onclick = () => checkMC(btn, c.e === w.e, w.k);
    container.appendChild(btn);
  });
}

function checkMC(btn, isCorrect, correctAnswer) {
  if (mcAnswered) return;
  mcAnswered = true;
  if (isCorrect) {
    btn.classList.add('correct');
    mcCorrect++;
    score += 10;
    streak++;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    // Show correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correctAnswer) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  document.getElementById('mcNextBtn').style.display = 'block';
  updateScore();
  document.getElementById('mcScore').textContent = `맞은 문제: ${mcCorrect}`;
}

function mcNext() {
  mcIdx++;
  if (mcIdx >= currentWords.length) {
    showToast(`🎯 완료! ${mcCorrect}/${currentWords.length} 정답!`);
    sendScoreToSheet('객관식', mcCorrect);
    mcIdx = 0; mcCorrect = 0;
  }
  renderMC();
}

// ── SHORT ANSWER ──
function renderSA() {
  if (!currentWords.length) return;
  saAnswered = false;
  const w = currentWords[saIdx % currentWords.length];
  document.getElementById('saMeaning').textContent = w.k;
  document.getElementById('saCurrent').textContent = saIdx + 1;
  document.getElementById('saTotal').textContent = currentWords.length;
  document.getElementById('saScore').textContent = `맞은 문제: ${saCorrect}`;

  const hint = w.e.split('').map((c, i) => i === 0 ? c : (c === ' ' ? ' ' : '_')).join('');
  document.getElementById('saHint').textContent = `힌트: ${hint} (${w.e.length}글자)`;

  const input = document.getElementById('saInput');
  input.value = '';
  input.className = 'sa-input';
  input.disabled = false;
  document.getElementById('saFeedback').textContent = '';
  document.getElementById('saFeedback').style.color = '';
  document.getElementById('saNextBtn').style.display = 'none';
  document.getElementById('saCheckBtn').style.display = '';
  setTimeout(() => input.focus(), 100);
}

function checkSA() {
  if (saAnswered) return;
  const w = currentWords[saIdx % currentWords.length];
  const input = document.getElementById('saInput');
  const answer = input.value.trim().toLowerCase();
  const correct = w.e.toLowerCase();
  saAnswered = true;
  input.disabled = true;

  if (answer === correct) {
    input.className = 'sa-input correct';
    document.getElementById('saFeedback').textContent = '✅ 정답! 훌륭해요!';
    document.getElementById('saFeedback').style.color = 'var(--success)';
    saCorrect++; score += 15; streak++;
  } else {
    input.className = 'sa-input wrong';
    document.getElementById('saFeedback').textContent = `❌ 정답: ${w.e}`;
    document.getElementById('saFeedback').style.color = 'var(--error)';
    streak = 0;
  }
  document.getElementById('saNextBtn').style.display = 'block';
  document.getElementById('saCheckBtn').style.display = 'none';
  updateScore();
  document.getElementById('saScore').textContent = `맞은 문제: ${saCorrect}`;
}

function showSAHint() {
  const w = currentWords[saIdx % currentWords.length];
  const halfReveal = w.e.split('').map((c, i) => i % 2 === 0 ? c : (c === ' ' ? ' ' : '_')).join('');
  document.getElementById('saHint').textContent = `힌트: ${halfReveal}`;
}

function saNext() {
  saIdx++;
  if (saIdx >= currentWords.length) {
    showToast(`✏️ 완료! ${saCorrect}/${currentWords.length} 정답!`);
    sendScoreToSheet('주관식', saCorrect);
    saIdx = 0; saCorrect = 0;
  }
  renderSA();
}

// ── SHADOWING ──
function renderShadow() {
  if (!currentWords.length) return;
  const w = currentWords[shadowIdx % currentWords.length];
  document.getElementById('shadowWord').textContent = w.e;
  document.getElementById('shadowMeaning').textContent = w.k;
  document.getElementById('shadowIdx').textContent = shadowIdx + 1;
  document.getElementById('shadowTotal').textContent = currentWords.length;
  document.getElementById('shadowTip').textContent = '발음을 듣고 따라 말해보세요! 🎤';

  // Simple IPA hints for common words
  const ipaMap = {
    meal: '/miːl/', prepare: '/prɪˈpɛr/', awake: '/əˈweɪk/', rest: '/rɛst/',
    borrow: '/ˈbɒrəʊ/', lend: '/lɛnd/', forget: '/fərˈɡɛt/'
  };
  document.getElementById('shadowIPA').textContent = ipaMap[w.e] || '';

  stopWave();
}

function shadowSpeak() {
  const w = currentWords[shadowIdx % currentWords.length];
  speak(w.e, 1);
  startWave(1500);
}

function shadowSlowSpeak() {
  const w = currentWords[shadowIdx % currentWords.length];
  speak(w.e, 0.7);
  startWave(2200);
}

function shadowRepeat() {
  const w = currentWords[shadowIdx % currentWords.length];
  let i = 0;
  function next() {
    if (i >= 3) return;
    speak(w.e, 0.85);
    startWave(1600);
    i++;
    setTimeout(next, 2000);
  }
  next();
}

let mediaRecorder = null;
let recording = false;

function toggleRecord() {
  const btn = document.getElementById('shadowRecBtn');
  if (!recording) {
    if (!navigator.mediaDevices) {
      showToast('⚠️ 마이크 접근이 지원되지 않습니다');
      return;
    }
    navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.start();
      recording = true;
      btn.textContent = '⏹️ 녹음 중지';
      btn.classList.add('active');
      startWave(999999);
      document.getElementById('shadowTip').textContent = '🔴 녹음 중... 멈추려면 버튼을 다시 누르세요';
      mediaRecorder.ondataavailable = () => {};
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        showToast('✅ 녹음 완료! 잘 했어요!');
        document.getElementById('shadowTip').textContent = '녹음이 완료됐어요! 다시 시도해보세요 👏';
        stopWave();
      };
    }).catch(() => showToast('⚠️ 마이크 권한이 필요합니다'));
  } else {
    mediaRecorder.stop();
    recording = false;
    btn.textContent = '🎙️ 내 발음 녹음';
    btn.classList.remove('active');
  }
}

function startWave(duration) {
  const bars = document.querySelectorAll('.wave-bar');
  bars.forEach(b => b.classList.add('active'));
  if (duration < 99999) setTimeout(() => stopWave(), duration);
}

function stopWave() {
  document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
}

function shadowNext() {
  shadowIdx++;
  if (shadowIdx >= currentWords.length) {
    showToast('🎤 쉐도잉 완료!');
    shadowIdx = 0;
  }
  renderShadow();
}

function shadowPrev() {
  if (shadowIdx > 0) { shadowIdx--; renderShadow(); }
}

// ── WORD LIST ──
function renderList() {
  const tbody = document.getElementById('wordListBody');
  tbody.innerHTML = '';
  currentWords.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="word-en">${w.e}</span></td>
      <td><span class="word-ko">${w.k}</span></td>
      <td style="color:var(--muted); font-size:12px">${w.d}</td>
      <td><button class="mini-speak" onclick="speak('${w.e.replace(/'/g,"\\'")}', 1)">🔊</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function filterWords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.querySelectorAll('#wordListBody tr');
  rows.forEach(r => {
    const text = r.textContent.toLowerCase();
    r.style.display = text.includes(q) ? '' : 'none';
  });
}

// ── TTS ──
function speak(text, rate = 1) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = rate;
  utt.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const en = voices.find(v => v.lang === 'en-US' && !v.name.includes('Google')) ||
             voices.find(v => v.lang.startsWith('en'));
  if (en) utt.voice = en;
  window.speechSynthesis.speak(utt);
  return utt;
}

function speakWord() {
  const w = currentWords[currentIdx];
  if (!w) return;
  const btn = document.getElementById('flashSpeakBtn');
  if (btn) { btn.classList.add('speaking'); setTimeout(() => btn.classList.remove('speaking'), 1800); }
  speak(w.e);
}

function speakKorean() {
  const w = currentWords[currentIdx];
  if (!w) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(w.k);
  utt.lang = 'ko-KR';
  window.speechSynthesis.speak(utt);
}

// ── SCORE & PROGRESS ──
function updateScore() {
  document.getElementById('scoreBadge').textContent = `⭐ ${score}점`;
}

function updateProgress() {
  const total = currentWords.length || 1;
  let done = 0;
  if (currentMode === 'flash') done = currentIdx;
  else if (currentMode === 'mc') done = mcIdx;
  else if (currentMode === 'sa') done = saIdx;
  else if (currentMode === 'shadow') done = shadowIdx;
  document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Load voices
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

init();
</script>
