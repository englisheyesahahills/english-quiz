<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>부정명령문 & 제안문 & 감탄문 퀴즈 | 잉글리시아이스텔라영어학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#22314a;
    --ink-soft:#5b6b85;
    --paper:#fff8ec;
    --card:#ffffff;
    --accent:#ff7a45;
    --accent-deep:#e8632f;
    --accent-pale:#ffe3d1;
    --good:#2e9e5b;
    --good-pale:#e3f7ea;
    --bad:#e04b4b;
    --bad-pale:#fdeaea;
    --line:#eee1cf;
    --navy:#1f3a5f;
    shape-rendering: geometricPrecision;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 0%, #fff2df 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #ffe9da 0%, transparent 40%),
      var(--paper);
    min-height:100vh;
    font-family:'Noto Sans KR', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:20px 14px 60px;
  }
  .app{ width:100%; max-width:560px; }

  .brand{
    text-align:center;
    margin-bottom:14px;
  }
  .brand .name{
    font-size:13px; font-weight:700; letter-spacing:.04em;
    color:var(--accent-deep); text-transform:uppercase;
  }
  .brand h1{
    font-family:'Gaegu', 'Noto Sans KR', sans-serif;
    font-size:30px; margin:4px 0 0; color:var(--navy); line-height:1.25;
  }
  .brand .sub{ font-size:13px; color:var(--ink-soft); margin-top:6px; }

  .card{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:22px;
    padding:26px 22px;
    box-shadow: 0 10px 0 var(--line);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:8px;
    background:repeating-linear-gradient(90deg,var(--accent) 0 18px, var(--accent-pale) 18px 36px);
  }

  /* ---------- screen: start ---------- */
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-weight:700; font-size:14px; margin-bottom:6px; color:var(--navy); }
  .field select, .field input{
    width:100%; padding:13px 14px; border-radius:12px; border:2px solid var(--line);
    font-size:16px; font-family:inherit; background:#fffdf9; color:var(--ink);
  }
  .field select:focus, .field input:focus{ outline:none; border-color:var(--accent); }

  .meta-line{
    display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft);
    background:var(--accent-pale); border-radius:12px; padding:10px 14px; margin-bottom:18px;
  }

  button.primary{
    width:100%; border:none; cursor:pointer;
    background:var(--accent); color:#fff; font-weight:900; font-size:17px;
    padding:15px; border-radius:14px; font-family:inherit;
    box-shadow:0 5px 0 var(--accent-deep);
    transition:transform .05s ease;
  }
  button.primary:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--accent-deep); }
  button.primary:disabled{ background:#d8cfc2; box-shadow:0 5px 0 #c3baae; cursor:not-allowed; }

  button.ghost{
    width:100%; border:2px solid var(--line); cursor:pointer; background:#fff;
    color:var(--navy); font-weight:700; font-size:15px; padding:12px; border-radius:14px;
    font-family:inherit; margin-top:10px;
  }

  /* ---------- screen: quiz ---------- */
  .progress-wrap{ margin-bottom:18px; }
  .progress-top{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; color:var(--navy); margin-bottom:6px;}
  .progress-bar{ height:10px; border-radius:99px; background:var(--accent-pale); overflow:hidden; }
  .progress-fill{ height:100%; background:var(--accent); border-radius:99px; transition:width .3s ease; }

  .tag-row{ display:flex; gap:6px; margin-bottom:12px; }
  .tag{
    font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:99px;
  }
  .tag.하{ background:#e3f7ea; color:var(--good); }
  .tag.중{ background:#fff3d9; color:#b9790a; }
  .tag.상{ background:var(--bad-pale); color:var(--bad); }
  .tag.pt{ background:#eef1fb; color:var(--navy); }

  .q-text{ font-size:16.5px; font-weight:700; line-height:1.55; margin-bottom:10px; }
  .q-context{
    background:#f6f2ea; border-left:4px solid var(--accent); border-radius:8px;
    padding:12px 14px; font-size:16px; font-style:italic; margin-bottom:18px; color:#3b3226;
  }
  .options{ display:grid; gap:10px; }
  .opt{
    display:flex; align-items:center; gap:10px;
    text-align:left; width:100%; padding:14px 14px; border-radius:14px;
    border:2px solid var(--line); background:#fffdf9; cursor:pointer;
    font-family:inherit; font-size:15.5px; color:var(--ink);
  }
  .opt .num{
    flex:0 0 auto; width:26px; height:26px; border-radius:50%; background:var(--accent-pale);
    color:var(--accent-deep); font-weight:900; font-size:13px; display:flex; align-items:center; justify-content:center;
  }
  .opt.selected{ border-color:var(--accent); background:#fff3ea; }
  .opt:active{ transform:scale(.99); }

  .nav-row{ display:flex; gap:10px; margin-top:22px; }
  .nav-row button.secondary{
    flex:0 0 84px; border:2px solid var(--line); background:#fff; border-radius:14px;
    font-family:inherit; font-weight:700; color:var(--navy); cursor:pointer;
  }
  .nav-row .primary{ flex:1; }

  /* ---------- screen: result ---------- */
  .score-hero{ text-align:center; margin-bottom:6px; }
  .score-ring{
    width:150px; height:150px; margin:0 auto 12px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--accent-pale) 0);
    position:relative;
  }
  .score-ring::before{
    content:""; position:absolute; inset:10px; background:#fff; border-radius:50%;
  }
  .score-ring .num{ position:relative; font-size:34px; font-weight:900; color:var(--navy); font-family:'Gaegu',sans-serif;}
  .score-ring .lbl{ position:relative; font-size:12px; color:var(--ink-soft); font-weight:700; }
  .grade-badge{
    display:inline-block; margin:6px auto 4px; padding:5px 16px; border-radius:99px;
    background:var(--navy); color:#fff; font-weight:900; font-size:14px; letter-spacing:.03em;
  }
  .score-sub{ text-align:center; color:var(--ink-soft); font-size:13.5px; margin-bottom:20px; }

  .level-grid{ display:flex; gap:8px; margin-bottom:20px; }
  .level-box{ flex:1; text-align:center; border:2px solid var(--line); border-radius:14px; padding:10px 6px; }
  .level-box .lv{ font-weight:900; font-size:13px; margin-bottom:4px; }
  .level-box .fr{ font-size:15px; font-weight:700; color:var(--navy); }
  .level-box.하 .lv{ color:var(--good); }
  .level-box.중 .lv{ color:#b9790a; }
  .level-box.상 .lv{ color:var(--bad); }

  .wrong-title{ font-weight:900; color:var(--navy); font-size:15px; margin:6px 0 10px; }
  .wrong-item{
    border:2px solid var(--bad-pale); background:var(--bad-pale); border-radius:14px;
    padding:13px 14px; margin-bottom:10px; font-size:13.8px; line-height:1.55;
  }
  .wrong-item .num{ font-weight:900; color:var(--bad); margin-right:4px; }
  .wrong-item .ans-line{ margin-top:6px; }
  .wrong-item .ans-line b{ color:var(--good); }
  .wrong-item .explain{ margin-top:6px; color:#5c4b45; }
  .all-correct{
    text-align:center; padding:18px; background:var(--good-pale); border-radius:14px;
    color:var(--good); font-weight:700; margin-bottom:16px;
  }

  .submit-box{
    margin-top:18px; padding:16px; border-radius:14px; background:#eef1fb; text-align:center;
  }
  .submit-box .status{ font-size:13px; margin-top:10px; color:var(--ink-soft); }
  .submit-box .status.ok{ color:var(--good); font-weight:700; }
  .submit-box .status.err{ color:var(--bad); font-weight:700; }

  .hidden{ display:none !important; }
  .footer-note{ text-align:center; font-size:11.5px; color:#b9ac9a; margin-top:16px; }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="name">잉글리시아이스텔라영어학원</div>
    <h1>부정명령문 & 제안문 & 감탄문 퀴즈</h1>
    <div class="sub">Grammar 3 · Lesson 10·11·12 · 객관식 25문항</div>
  </div>

  <!-- ===== SCREEN 1: START ===== -->
  <div class="card" id="screen-start">
    <div class="field">
      <label>반을 선택하세요</label>
      <select id="input-class">
        <option value="A반">A반</option>
        <option value="B반">B반</option>
        <option value="C반">C반</option>
        <option value="D반">D반</option>
      </select>
    </div>
    <div class="field">
      <label>이름을 입력하세요</label>
      <input id="input-name" type="text" placeholder="예: 김나연" maxlength="20">
    </div>
    <div class="meta-line">
      <span>📝 총 25문항</span>
      <span>💯 100점 만점</span>
      <span>⏱ 제한시간 없음</span>
    </div>
    <button class="primary" id="btn-start">시작하기</button>
  </div>

  <!-- ===== SCREEN 2: QUIZ ===== -->
  <div class="card hidden" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-top">
        <span id="q-index">문항 1 / 25</span>
        <span id="q-score-live">0점 / 100점</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:4%"></div></div>
    </div>
    <div class="tag-row">
      <span class="tag" id="tag-level">하</span>
      <span class="tag pt" id="tag-points">3점</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-context hidden" id="q-context"></div>
    <div class="options" id="q-options"></div>
    <div class="nav-row">
      <button class="secondary" id="btn-prev">이전</button>
      <button class="primary" id="btn-next" disabled>다음</button>
    </div>
  </div>

  <!-- ===== SCREEN 3: RESULT ===== -->
  <div class="card hidden" id="screen-result">
    <div class="score-hero">
      <div class="score-ring" id="score-ring" style="--pct:0">
        <div class="num" id="score-num">0</div>
        <div class="lbl">/ 100점</div>
      </div>
      <div class="grade-badge" id="grade-badge">-</div>
    </div>
    <div class="score-sub" id="score-sub"></div>

    <div class="level-grid">
      <div class="level-box 하"><div class="lv">하</div><div class="fr" id="lv-하">0/8</div></div>
      <div class="level-box 중"><div class="lv">중</div><div class="fr" id="lv-중">0/9</div></div>
      <div class="level-box 상"><div class="lv">상</div><div class="fr" id="lv-상">0/8</div></div>
    </div>

    <div id="wrong-wrap"></div>

    <div class="submit-box">
      <button class="primary" id="btn-submit">📤 노션에 결과 저장하기</button>
      <div class="status" id="submit-status">선생님이 결과를 확인할 수 있도록 저장해 주세요.</div>
    </div>
    <button class="ghost" id="btn-retry">다시 풀기</button>
  </div>

  <div class="footer-note">© 잉글리시아이스텔라영어학원</div>
</div>

<script>
/* =========================================================
   1) 문제 데이터 (25문항 / 100점)
   ========================================================= */
const QUESTIONS = [
  {level:"하",points:3,q:"1. 빈칸에 알맞은 것은? (내 머리카락을 당기지 마라.)",context:"___ my hair.",options:["Do not pull","Do pull not","Pull not","Not pull"],answer:0,explain:"부정명령문은 Do not[Don't] + 동사원형으로 만든다."},
  {level:"하",points:3,q:"2. 빈칸에 알맞은 것은? (너의 손톱을 물지 마라.)",context:"___ your nails.",options:["Don't bite","Don't bites","Not bite","Bite not"],answer:0,explain:"Don't 뒤에는 동사원형이 온다."},
  {level:"하",points:3,q:"3. 빈칸에 알맞은 것은? (함께 춤추자.)",context:"___ dance together.",options:["Let's","Let","We let's","Lets"],answer:0,explain:"제안문은 Let's(Let us) + 동사원형으로 시작한다."},
  {level:"하",points:3,q:"4. 대화의 빈칸에 알맞은 것은? (좋아.)",context:"A: Let's play baseball.   B: ___.",options:["Sure.","Sorry, I can't.","Don't play.","Not sure."],answer:0,explain:"제안에 대한 긍정의 대답으로 Sure.를 쓸 수 있다."},
  {level:"하",points:3,q:"5. 빈칸에 알맞은 것은? (그 집은 정말 크구나!)",context:"___ big the house is!",options:["How","What","Who","Which"],answer:0,explain:"형용사 big을 강조하는 감탄문은 How로 시작한다."},
  {level:"하",points:3,q:"6. 빈칸에 알맞은 것은? (그것은 정말 큰 집이구나!)",context:"___ a big house it is!",options:["What","How","Who","Which"],answer:0,explain:"명사 house를 강조하는 감탄문은 What으로 시작한다."},
  {level:"하",points:3,q:"7. 다음 중 어법상 올바른 문장은?",context:"",options:["Don't bites your nails.","Don't bite your nails.","Doesn't bite your nails.","Not bite your nails."],answer:1,explain:"Don't 뒤에는 동사원형 bite가 와야 한다."},
  {level:"하",points:3,q:"8. 빈칸에 알맞은 것은? (그 유리잔을 깨지 마라.)",context:"___ the glass.",options:["Don't break","Doesn't break","Not break","Break not"],answer:0,explain:"부정명령문은 Don't + 동사원형으로 만든다."},
  {level:"중",points:4,q:"9. 다음 문장을 부정명령문으로 바르게 바꾼 것은?",context:"You listen to loud music.",options:["Don't listen to loud music.","Doesn't listen to loud music.","Not listen to loud music.","Listen not to loud music."],answer:0,explain:"주어 You를 없애고 Don't + 동사원형으로 만든다."},
  {level:"중",points:4,q:"10. 대화의 빈칸에 알맞은 것은? (미안하지만 안 돼.)",context:"A: Let's watch a movie.   B: ___",options:["Sorry, I can't.","Sure, let's.","Don't watch.","No, you can't."],answer:0,explain:"제안을 거절할 때는 Sorry, I can't.를 쓴다."},
  {level:"중",points:4,q:"11. 빈칸에 알맞은 것은? (그 판다는 정말 게으르구나!)",context:"How ___ the panda is!",options:["lazy","a lazy","lazily","laziness"],answer:0,explain:"How 감탄문은 How+형용사+주어+동사 순서로 쓴다."},
  {level:"중",points:4,q:"12. 빈칸에 알맞은 것은? (이것은 정말 두꺼운 책이구나!)",context:"What a ___ book this is!",options:["thick","thickly","thickness","thicker"],answer:0,explain:"명사 book을 꾸며주는 형용사 thick이 알맞다."},
  {level:"중",points:4,q:"13. 다음 문장을 제안문으로 바르게 바꾼 것은?",context:"We clean the living room.",options:["Let's clean the living room.","Let's cleans the living room.","Let we clean the living room.","Cleaning the living room."],answer:0,explain:"제안문은 Let's + 동사원형으로 만든다."},
  {level:"중",points:4,q:"14. 빈칸에 알맞은 것은? (그는 정말 유명한 사람이구나!)",context:"___ a famous person he is!",options:["What","How","Which","Who"],answer:0,explain:"명사 person을 강조하는 감탄문은 What으로 시작한다."},
  {level:"중",points:4,q:"15. 다음 중 어법상 <u>틀린</u> 것은?",context:"",options:["Don't fight with your sister.","Don't fights with your sister.","Don't touch the diamond.","Don't move."],answer:1,explain:"Don't 뒤에는 동사원형 fight가 와야 하므로 fights는 틀렸다."},
  {level:"중",points:4,q:"16. 빈칸에 알맞은 것은? (그 소방관은 정말 용감하구나!)",context:"How ___ the firefighter is!",options:["brave","a brave","bravely","braveness"],answer:0,explain:"How 감탄문에는 형용사 brave가 알맞다."},
  {level:"중",points:4,q:"17. 다음 문장을 제안문으로 바르게 바꾼 것은?",context:"We go to the palace.",options:["Let's go to the palace.","Let's goes to the palace.","Lets go to the palace.","Let we go to the palace."],answer:0,explain:"제안문은 Let's + 동사원형으로 만든다."},
  {level:"상",points:5,q:"18. 어법상 <u>틀린</u> 문장은?",context:"",options:["Don't be late for school.","Wake up right now.","Don't bites your nails.","Don't touch the diamond."],answer:2,explain:"Don't 뒤에는 동사원형이 와야 하므로 bites가 아니라 bite로 써야 한다."},
  {level:"상",points:5,q:"19. 다음 중 감탄문으로 어법상 올바른 것은?",context:"",options:["How a lovely girl she is!","What lovely the girl is!","How lovely the girl is!","What a lovely she is!"],answer:2,explain:"형용사 lovely를 강조할 때는 How+형용사+주어+동사! 형태를 쓴다."},
  {level:"상",points:5,q:"20. 다음 중 감탄문으로 어법상 올바른 것은?",context:"",options:["What an old tower it is!","How an old tower it is!","What old tower it is!","How old a tower it is!"],answer:0,explain:"명사 tower를 강조할 때는 What+a/an+형용사+명사+주어+동사! 형태를 쓴다."},
  {level:"상",points:5,q:"21. 다음 대화 중 어법상 어색한 것은?",context:"",options:["A: Let's ride a bike. B: Sounds great.","A: Let's make a cake. B: Sorry, I can't.","A: Let's eat pizza. B: Let's not eats pizza.","A: Let's dance together. B: Okay."],answer:2,explain:"제안문 부정형도 Let's not+동사원형이므로 eats가 아니라 eat로 써야 한다."},
  {level:"상",points:5,q:"22. 다음 문장을 부정명령문으로 바르게 바꾼 것은? (도로에 쓰레기를 버리지 마라.)",context:"You throw trash on the road.",options:["Don't throw trash on the road.","Doesn't throw trash on the road.","Not throw trash on the road.","Don't throws trash on the road."],answer:0,explain:"주어 You를 없애고 Don't + 동사원형으로 만든다."},
  {level:"상",points:5,q:"23. 다음 중 나머지 셋과 형태가 <u>다른</u> 감탄문은?",context:"",options:["How big the house is!","How sweet this is!","What a big house it is!","How brave the firefighter is!"],answer:2,explain:"나머지는 How로 시작하는 감탄문이지만, 이것만 What으로 시작하는 형태이다."},
  {level:"상",points:5,q:"24. 우리말을 영어로 옮길 때 어법상 옳은 것은? (그것들은 정말 재미있구나!)",context:"",options:["How interesting they are!","What interesting they are!","How they are interesting!","What an interesting they are!"],answer:0,explain:"형용사 interesting을 강조하는 How 감탄문이 알맞다."},
  {level:"상",points:5,q:"25. 우리말을 영어로 옮길 때 어법상 옳은 것은? (그 치타는 정말 빨리 달리는구나!)",context:"",options:["How fast the cheetah runs!","What fast the cheetah runs!","How the cheetah runs fast!","What a fast the cheetah runs!"],answer:0,explain:"부사 fast를 강조하는 How 감탄문이 알맞다."}
];
const TOTAL_POINTS = QUESTIONS.reduce((s,q)=>s+q.points,0); // 100
const OPT = ["①","②","③","④"];

/* =========================================================
   2) 노션 자동 저장용 엔드포인트
   -- 학원 담당자가 Google Apps Script 배포 후 아래 URL만 교체하면
      "결과 저장하기" 버튼이 노션 DB에 자동으로 기록됩니다.
   -- 비워두면 결과 텍스트를 복사하는 방식으로 대체됩니다.
   ========================================================= */
const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbzxYmQ2qGjX4o3RV9utdsXHlcDTRopcjfT5Ju01wQ1LAFECIWCzYjDwZC2SyoS-OjBCWw/exec";

/* ========================================================= */

let current = 0;
let studentAnswers = new Array(QUESTIONS.length).fill(null);
let studentName = "";
let studentClass = "";

const $ = (id) => document.getElementById(id);

$("btn-start").addEventListener("click", () => {
  studentName = $("input-name").value.trim();
  studentClass = $("input-class").value;
  if(!studentName){
    alert("이름을 입력해 주세요!");
    return;
  }
  $("screen-start").classList.add("hidden");
  $("screen-quiz").classList.remove("hidden");
  renderQuestion();
});

function renderQuestion(){
  const item = QUESTIONS[current];
  $("q-index").textContent = `문항 ${current+1} / ${QUESTIONS.length}`;
  $("progress-fill").style.width = `${((current+1)/QUESTIONS.length)*100}%`;
  $("tag-level").textContent = item.level;
  $("tag-level").className = `tag ${item.level}`;
  $("tag-points").textContent = `${item.points}점`;
  $("q-text").textContent = item.q;

  const ctx = $("q-context");
  if(item.context){
    ctx.textContent = item.context;
    ctx.classList.remove("hidden");
  } else {
    ctx.classList.add("hidden");
  }

  const liveScore = studentAnswers.reduce((s,a,i)=> s + (a===QUESTIONS[i].answer ? QUESTIONS[i].points : 0), 0);
  $("q-score-live").textContent = `${liveScore}점 / ${TOTAL_POINTS}점`;

  const optWrap = $("q-options");
  optWrap.innerHTML = "";
  item.options.forEach((optText, idx) => {
    const btn = document.createElement("button");
    btn.className = "opt" + (studentAnswers[current]===idx ? " selected" : "");
    btn.innerHTML = `<span class="num">${OPT[idx]}</span><span>${optText}</span>`;
    btn.addEventListener("click", () => {
      studentAnswers[current] = idx;
      renderQuestion();
    });
    optWrap.appendChild(btn);
  });

  $("btn-prev").style.visibility = current === 0 ? "hidden" : "visible";
  $("btn-next").disabled = studentAnswers[current] === null;
  $("btn-next").textContent = current === QUESTIONS.length - 1 ? "제출하기" : "다음";
}

$("btn-prev").addEventListener("click", () => {
  if(current > 0){ current--; renderQuestion(); }
});

$("btn-next").addEventListener("click", () => {
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult(){
  $("screen-quiz").classList.add("hidden");
  $("screen-result").classList.remove("hidden");

  let earned = 0, correctCount = 0;
  const wrongList = [];
  const levelStats = {"하":{c:0,t:0},"중":{c:0,t:0},"상":{c:0,t:0}};

  QUESTIONS.forEach((item, i) => {
    levelStats[item.level].t++;
    const isCorrect = studentAnswers[i] === item.answer;
    if(isCorrect){
      earned += item.points;
      correctCount++;
      levelStats[item.level].c++;
    } else {
      wrongList.push({num:i+1, item, your: studentAnswers[i]});
    }
  });

  const pct = Math.round((earned/TOTAL_POINTS)*100);
  $("score-ring").style.setProperty("--pct", pct);
  $("score-num").textContent = earned;

  let grade = "D", gradeColor="var(--bad)";
  if(pct>=95){grade="A+";} else if(pct>=90){grade="A";} else if(pct>=80){grade="B+";}
  else if(pct>=70){grade="B";} else if(pct>=60){grade="C";}
  $("grade-badge").textContent = `${grade} 등급`;

  $("score-sub").textContent = `${studentClass} · ${studentName} 학생 · 정답 ${correctCount} / ${QUESTIONS.length}문항`;

  ["하","중","상"].forEach(lv => {
    $(`lv-${lv}`).textContent = `${levelStats[lv].c}/${levelStats[lv].t}`;
  });

  const wrongWrap = $("wrong-wrap");
  wrongWrap.innerHTML = "";
  if(wrongList.length === 0){
    wrongWrap.innerHTML = `<div class="all-correct">🎉 전 문항 정답입니다! 완벽해요!</div>`;
  } else {
    const title = document.createElement("div");
    title.className = "wrong-title";
    title.textContent = `오답 노트 (${wrongList.length}문항)`;
    wrongWrap.appendChild(title);

    wrongList.forEach(w => {
      const div = document.createElement("div");
      div.className = "wrong-item";
      const yourText = w.your === null ? "선택 안 함" : `${OPT[w.your]} ${w.item.options[w.your]}`;
      div.innerHTML = `
        <span class="num">${w.num}.</span>${w.item.q.replace(/^\d+\.\s*/,"")}
        <div class="ans-line">내 답: ${yourText} → 정답: <b>${OPT[w.item.answer]} ${w.item.options[w.item.answer]}</b></div>
        <div class="explain">💡 ${w.item.explain}</div>
      `;
      wrongWrap.appendChild(div);
    });
  }

  // store for submit
  window.__quizResult = {
    이름: studentName,
    반: studentClass,
    단원: "부정명령문·제안문·감탄문",
    "맞은 개수": correctCount,
    "총 문제수": QUESTIONS.length,
    점수: earned,
    오답문항: wrongList.map(w=>w.num).join(", ") || "없음",
    제출시간: new Date().toISOString()
  };
  $("submit-status").textContent = "선생님이 결과를 확인할 수 있도록 저장해 주세요.";
  $("submit-status").className = "status";
  $("btn-submit").disabled = false;
  $("btn-submit").textContent = "📤 노션에 결과 저장하기";
}

$("btn-submit").addEventListener("click", async () => {
  const data = window.__quizResult;
  const statusEl = $("submit-status");
  const btn = $("btn-submit");

  if(!SUBMIT_URL){
    // fallback: 복사 가능한 텍스트 제공
    const text = `[문법퀴즈결과]\n이름: ${data.이름}\n반: ${data.반}\n단원: ${data.단원}\n점수: ${data.점수}/100\n맞은개수: ${data["맞은 개수"]}/${data["총 문제수"]}\n오답문항: ${data.오답문항}`;
    try{
      await navigator.clipboard.writeText(text);
      statusEl.textContent = "저장 링크가 아직 설정되지 않아, 결과를 클립보드에 복사했어요. 선생님께 붙여넣어 전달해 주세요!";
      statusEl.className = "status ok";
    }catch(e){
      statusEl.textContent = text;
      statusEl.className = "status";
    }
    return;
  }

  btn.disabled = true;
  btn.textContent = "저장 중...";
  statusEl.textContent = "";
  try{
    const res = await fetch(SUBMIT_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain"},
      body: JSON.stringify(data)
    });
    const raw = await res.text();
    let parsed = null;
    try{ parsed = JSON.parse(raw); }catch(e){ /* not JSON */ }

    const isSuccess = parsed && (parsed.object === "page" || (parsed.id && !parsed.error && parsed.object !== "error"));

    if(isSuccess){
      statusEl.textContent = "✅ 노션에 결과가 저장되었습니다!";
      statusEl.className = "status ok";
      btn.textContent = "저장 완료";
    } else {
      const msg = (parsed && (parsed.message || parsed.error)) || raw || "알 수 없는 오류";
      console.error("Notion 저장 실패 응답:", raw);
      statusEl.textContent = "⚠ 저장 실패: " + msg;
      statusEl.className = "status err";
      btn.disabled = false;
      btn.textContent = "📤 다시 시도하기";
    }
  }catch(err){
    statusEl.textContent = "저장에 실패했어요. 네트워크를 확인하고 다시 시도해 주세요. (" + err.message + ")";
    statusEl.className = "status err";
    btn.disabled = false;
    btn.textContent = "📤 다시 시도하기";
  }
});

$("btn-retry").addEventListener("click", () => {
  current = 0;
  studentAnswers = new Array(QUESTIONS.length).fill(null);
  $("screen-result").classList.add("hidden");
  $("screen-start").classList.remove("hidden");
});
</script>
</body>
</html>
